  .header h1{font-family:Georgia,"Times New Roman",serif;letter-spacing:.2em;font-size:clamp(24px,4.5vw,42px);font-weight:700;color:#fff}
  .crest{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;display:flex;align-items:center;justify-content:center}
  .crest img{max-width:52px;max-height:52px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.75))}
  .crest.left{left:8px}.crest.right{right:8px}

  .pitch{position:relative;width:100%;aspect-ratio:1000/660;margin-top:0;border-radius:0;overflow:hidden;
    background:linear-gradient(180deg,#f3f5f8,#e9edf2)}
  .pitch svg.lines{position:absolute;inset:0;width:100%;height:100%}
  .layer{position:absolute;inset:0}

  .slot{position:absolute;transform:translate(-50%,-50%);width:132px;text-align:center;z-index:2}
  .top{position:relative;height:66px}
  .idcol{position:absolute;left:2px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:3px;z-index:2}
  .photo-wrap{height:66px;display:flex;align-items:flex-end;justify-content:center}
  .photo{height:66px;width:auto;max-width:110px;object-fit:contain;filter:drop-shadow(0 3px 4px rgba(0,0,0,.25))}
  .jersey{height:60px;width:48px;border-radius:8px;background:linear-gradient(180deg,#22386b,#16284f);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff}
  .flag{font-size:13px;line-height:1}
  .num{font-weight:800;font-size:15px;color:var(--ink);border-bottom:2px solid var(--ink);display:inline-block;line-height:1.1;padding:0 2px;min-width:14px}
  .name{font-weight:800;font-size:12px;color:var(--ink);letter-spacing:.01em;margin-top:3px;line-height:1.05;text-transform:uppercase}
  .bio{font-size:9.5px;color:var(--muted);margin-top:1px;white-space:nowrap}
  .stats{display:inline-block;margin-top:4px;border:1.5px solid var(--box);border-radius:4px;background:#fff;padding:2px 6px;text-align:center}
  .stats .row{display:flex;align-items:center;justify-content:center;gap:4px;line-height:1;white-space:nowrap}
  .stats .v{color:var(--orange);font-weight:800;font-size:12px;min-width:9px;text-align:right}
  .stats .ic{display:block;width:15px;height:15px;object-fit:contain;flex:none}
  .gleft{position:absolute;top:0;right:36px;color:#e11d2a;font-weight:800;font-size:13px;z-index:3;text-shadow:0 1px 2px rgba(255,255,255,.6)}

  .slot.empty .ph{width:46px;height:46px;border-radius:50%;border:2px dashed var(--line);color:var(--muted);
    display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto;background:rgba(255,255,255,.35)}
  .slot.empty .phlab{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.08em}
  .editctl{margin-top:5px;width:112px;max-width:112px;font-size:10.5px;padding:3px 4px;border-radius:6px;
    background:rgba(10,20,40,.92);color:#fff;border:1px solid rgba(255,255,255,.3)}

  .note{max-width:1280px;margin:10px auto 30px;padding:0 16px;color:#9fb0c8;font-size:12px;line-height:1.5}
  .note code{background:#11203a;padding:2px 6px;border-radius:4px;color:#cfe}

  :root{

  body{background:#fff;color:var(--ui-ink)}

function buildSlots(form){
  const lines=FORMATIONS[form], ys=YS[lines.length];
  slots=[];
  lines.forEach((ln,li)=>{
    const grp=ln[0], n=ln[1], y=ys[li];
    for(let k=0;k<n;k++){ slots.push({grp, gk:grp==="GK", x:12+76*(k+0.5)/n, y}); }
  });
  selection=slots.map(()=>null);
}

function optionsFor(slot, squad, myVal){
  const used=new Set(selection.filter((v,i)=>v!=null && i!==slots.indexOf(slot)));
  const opt=(i)=>`<option value="${i}" ${i===myVal?"selected":""} ${used.has(i)&&i!==myVal?"disabled":""}>#${squad[i].num} ${squad[i].name}</option>`;
  const byPos=(P)=>squad.map((p,i)=>[p,i]).filter(([p])=>p.pos===P && p.num!=null).map(([,i])=>opt(i)).join("");
  if(slot.gk) return `<option value="">— gardien —</option>`+byPos("GK");
  return `<option value="">— joueur —</option>`+
    `<optgroup label="Défenseurs">${byPos("DEF")}</optgroup>`+
    `<optgroup label="Milieux">${byPos("MID")}</optgroup>`+
    `<optgroup label="Attaquants">${byPos("ATT")}</optgroup>`;
}

function cardInner(p){
  const num=(p.num==null)?"":p.num;
  const photo = p.photo
    ? `<img class="photo" data-num="${num}" data-avatar="${p._avatar||AVATAR}" src="${p.photo}" alt="">`
    : `<img class="photo avatar" data-avatar="${p._avatar||AVATAR}" src="${p._avatar||AVATAR}" alt="">`;
  const bio=[p.height?`${p.height} cm`:null,(p.age!=null)?`${p.age} ans`:null].filter(Boolean).join(" - ");
  const stats="";  // version sans buts/passes decisives
  return `${p.foot==='left'?'<span class="gleft">G</span>':''}<div class="top"><div class="idcol"><div class="flag">${p.flag||""}</div><div class="num">${num}</div></div><div class="photo-wrap">${photo}</div></div>
    <div class="name">${p.name}</div>
    <div class="bio">${bio}</div>${stats}`;
}
function placeholderInner(slot){
  return `<div class="ph">+</div><div class="phlab">${slot.gk?"Gardien":"Joueur"}</div>`;
}

const AVATAR='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 72"><circle cx="32" cy="22" r="15" fill="#b4bfd6"/><path d="M8 72 C8 52 19 44 32 44 C45 44 56 52 56 72 Z" fill="#b4bfd6"/></svg>');

function _emptURL(id){return 'https://s3.eu-west-1.amazonaws.com/image.mpg/2025-empt-'+id+'-400x300.png';}
function stampSquad(team){
  if(!team||!team.squad) return;
  var id=null;
  for(var i=0;i<team.squad.length;i++){
    var ph=team.squad[i].photo||'';
    var m=ph.match(/player_official_2025_(\d+)_/)||ph.match(/2025-empt-(\d+)-/);
    if(m){id=m[1];break;}
  }
  var av=id?_emptURL(id):AVATAR;
  team.squad.forEach(function(p){p._avatar=av;});
}
function stampAvatars(D){ if(D&&D.teams) Object.keys(D.teams).forEach(function(k){stampSquad(D.teams[k]);}); }

function wirePhotos(root){
  root.querySelectorAll("img.photo").forEach(img=>{
    const swap=()=>{const a=document.createElement("img");a.className="photo avatar";a.src=img.getAttribute('data-avatar')||AVATAR;a.alt="";if(img.parentNode)img.replaceWith(a);};
    img.addEventListener("error",swap);
    if(img.complete && img.naturalWidth===0) swap();
  });
}
function render(){
  const team=DATA.teams[teamSelect.value], squad=team.squad;
  ["crestL","crestR"].forEach(id=>{document.getElementById(id).innerHTML=team.logo?`<img src="${team.logo}" alt="">`:"";});
  const picked=selection.filter(v=>v!=null).length;
  document.getElementById("metaInfo").textContent=`${teamSelect.value} • ${formationSelect.value} • ${picked}/11 • saison ${DATA.season}`;
  const host=document.getElementById("layer"); host.innerHTML="";
  slots.forEach((slot,si)=>{
    const val=selection[si], p=val!=null?squad[val]:null;
    const div=document.createElement("div");
    div.className="slot"+(slot.gk?" gk":"")+(p?"":" empty");
    div.style.left=slot.x+"%"; div.style.top=slot.y+"%";
    div.innerHTML=(p?cardInner(p):placeholderInner(slot))+
      `<select class="editctl" data-si="${si}">${optionsFor(slot,squad,val)}</select>`;
    host.appendChild(div);
  });
  host.querySelectorAll("select.editctl").forEach(sel=>{
    sel.onchange=()=>{ const si=+sel.dataset.si; selection[si]=sel.value===""?null:+sel.value; render(); };
  });  wirePhotos(host);
}

async function toDataURL(url){
  const proxy="https://images.weserv.nl/?url="+encodeURIComponent(url)+"&output=png";
  const r=await fetch(proxy); const b=await r.blob();
  return await new Promise(res=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.readAsDataURL(b);});
}
async function boardCanvas(){
  const board=document.getElementById("board");
  const hide=[...board.querySelectorAll(".editctl, .slot.empty")];
  const prev=hide.map(e=>e.style.display); hide.forEach(e=>e.style.display="none");
  const imgs=[...board.querySelectorAll("img")]; const src0=imgs.map(im=>im.src);
  try{
    await Promise.all(imgs.map(async im=>{ if(im.src.indexOf("data:")===0)return; try{ im.src=await toDataURL(im.src); }catch(e){} }));
    return await html2canvas(board,{useCORS:true,backgroundColor:null,scale:2,logging:false});
  } finally {
    imgs.forEach((im,i)=>im.src=src0[i]);
    hide.forEach((e,i)=>e.style.display=prev[i]);
  }
}
function slug(){ return (teamSelect.value+"_"+formationSelect.value).replace(/[^a-z0-9]+/gi,"_"); }
async function withBtn(id,fn){
  if(!selection.some(v=>v!=null)){ alert("Sélectionne au moins un joueur."); return; }
  const b=document.getElementById(id); const o=b.textContent; b.textContent="…"; b.disabled=true;
  try{ await fn(); }catch(e){ alert("Export échoué : "+e); } finally{ b.textContent=o; b.disabled=false; }
}
function exportPNG(){ return withBtn("dl", async()=>{
  const c=await boardCanvas();
  const a=document.createElement("a"); a.download="compo_"+slug()+".png"; a.href=c.toDataURL("image/png"); a.click();
}); }
// Enveloppe les formes nommees "P<idx>_..." dans un groupe <p:grpSp> par joueur (carte + boite stats + textes).
function groupPlayersInSlideXml(xml){
  const NSP="http://schemas.openxmlformats.org/presentationml/2006/main";
  const NSA="http://schemas.openxmlformats.org/drawingml/2006/main";
  const doc=new DOMParser().parseFromString(xml,"application/xml");
  const spTree=doc.getElementsByTagName("p:spTree")[0]; if(!spTree) return xml;
  const kids=[];
  for(let n=spTree.firstChild;n;n=n.nextSibling){ if(n.nodeType===1 && (n.tagName==="p:pic"||n.tagName==="p:sp")) kids.push(n); }
  let maxId=1; const cnv=doc.getElementsByTagName("p:cNvPr");
  for(let i=0;i<cnv.length;i++){ const v=parseInt(cnv[i].getAttribute("id")||"0",10); if(v>maxId)maxId=v; }
  const nameOf=node=>{ const c=node.getElementsByTagName("p:cNvPr")[0]; return c?(c.getAttribute("name")||""):""; };
  const xfrmOf=node=>{ const x=node.getElementsByTagName("a:off")[0],e=node.getElementsByTagName("a:ext")[0];
    return (x&&e)?{x:+x.getAttribute("x"),y:+x.getAttribute("y"),cx:+e.getAttribute("cx"),cy:+e.getAttribute("cy")}:null; };
  const groups=new Map(), order=[];
  kids.forEach(node=>{ const m=nameOf(node).match(/^P(\d+)_/);
    if(m){ const k=m[1]; if(!groups.has(k)){groups.set(k,[]);order.push(k);} groups.get(k).push(node); } });
  const el=(ns,n,attrs)=>{ const e=doc.createElementNS(ns,n); if(attrs)for(const a in attrs)e.setAttribute(a,String(attrs[a])); return e; };
  order.forEach(k=>{
    const nodes=groups.get(k); if(!nodes.length) return;
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    nodes.forEach(nd=>{ const f=xfrmOf(nd); if(!f)return; minX=Math.min(minX,f.x);minY=Math.min(minY,f.y);maxX=Math.max(maxX,f.x+f.cx);maxY=Math.max(maxY,f.y+f.cy); });
    if(!isFinite(minX)) return;
    const gx=minX,gy=minY,gcx=maxX-minX,gcy=maxY-minY;
    const grp=el(NSP,"p:grpSp");
    const nv=el(NSP,"p:nvGrpSpPr");
    nv.appendChild(el(NSP,"p:cNvPr",{id:++maxId,name:"Joueur "+k}));
    nv.appendChild(el(NSP,"p:cNvGrpSpPr")); nv.appendChild(el(NSP,"p:nvPr"));
    const pr=el(NSP,"p:grpSpPr"); const xf=el(NSA,"a:xfrm");
    xf.appendChild(el(NSA,"a:off",{x:gx,y:gy})); xf.appendChild(el(NSA,"a:ext",{cx:gcx,cy:gcy}));
    xf.appendChild(el(NSA,"a:chOff",{x:gx,y:gy})); xf.appendChild(el(NSA,"a:chExt",{cx:gcx,cy:gcy}));
    pr.appendChild(xf); grp.appendChild(nv); grp.appendChild(pr);
    spTree.insertBefore(grp,nodes[0]);
    nodes.forEach(nd=>{ spTree.removeChild(nd); grp.appendChild(nd); });
  });
  return new XMLSerializer().serializeToString(doc);
}
async function pptxLayered(fileName){
  const board=document.getElementById("board");
  const layer=document.getElementById("layer");
  const hide=[...board.querySelectorAll(".editctl, .slot.empty")];
  const prevH=hide.map(e=>e.style.display); hide.forEach(e=>e.style.display="none");
  const imgs=[...board.querySelectorAll("img")]; const src0=imgs.map(im=>im.src);
  await Promise.all(imgs.map(async im=>{ if(im.src.indexOf("data:")===0)return; try{ im.src=await toDataURL(im.src); }catch(e){} }));
  let titleEl=null, tFrac=null;
  try{
    const bRect=board.getBoundingClientRect();
    const cards=[...layer.children].filter(c=>!c.classList.contains("empty"));
    // --- titre editable : on mesure le h1 puis on le masque pour ne PAS l'aplatir dans l'image de fond ---
    titleEl=board.querySelector(".header h1");
    if(titleEl){
      const tr=titleEl.getBoundingClientRect(), cs=getComputedStyle(titleEl);
      tFrac={ text:(titleEl.textContent||"").trim(),
        x:(tr.left-bRect.left)/bRect.width, y:(tr.top-bRect.top)/bRect.height,
        w:tr.width/bRect.width, h:tr.height/bRect.height,
        fontFrac:(parseFloat(cs.fontSize)||32)/bRect.width,
        spaceFrac:(parseFloat(cs.letterSpacing)||0)/bRect.width,
        bold:(cs.fontWeight==="bold"||(parseInt(cs.fontWeight,10)||400)>=600),
        face:(cs.fontFamily.split(",")[0]||"Georgia").replace(/["']/g,"").trim() };
      titleEl.style.visibility="hidden";
    }
    const ld=layer.style.display; layer.style.display="none";
    const bg=await html2canvas(board,{useCORS:true,backgroundColor:null,scale:2,logging:false});
    layer.style.display=ld;
    if(titleEl) titleEl.style.visibility="";
    const items=[];
    for(const c of cards){
      const r=c.getBoundingClientRect();
      // --- mesures (avant tout masquage) ---
      const bioEl=c.querySelector(".bio"); let bio=null;
      if(bioEl && (bioEl.textContent||"").trim()){
        const br=bioEl.getBoundingClientRect(), bs=getComputedStyle(bioEl);
        const m=(bs.color.match(/\d+/g)||[154,163,176]);
        bio={ text:bioEl.textContent.trim(),
          fx:(br.left-r.left)/r.width, fy:(br.top-r.top)/r.height,
          fw:br.width/r.width, fh:br.height/r.height,
          px:parseFloat(bs.fontSize)||9.5,
          color:((+m[0])<<16|(+m[1])<<8|(+m[2])).toString(16).padStart(6,"0") };
      }
      const statsBox=c.querySelector(".stats");
      const vEls=[...c.querySelectorAll(".stats .v")]; let stats=null, sbox=null;
      if(vEls.length){
        let L=Infinity,T=Infinity,Rr=-Infinity,Bb=-Infinity;
        vEls.forEach(v=>{const q=v.getBoundingClientRect(); L=Math.min(L,q.left);T=Math.min(T,q.top);Rr=Math.max(Rr,q.right);Bb=Math.max(Bb,q.bottom);});
        const vs=getComputedStyle(vEls[0]); const mm=(vs.color.match(/\d+/g)||[230,126,34]);
        let pitch=0;
        if(vEls.length>=2){const a0=vEls[0].getBoundingClientRect(),a1=vEls[1].getBoundingClientRect(); pitch=((a1.top+a1.bottom)-(a0.top+a0.bottom))/2;}
        stats={ text:vEls.map(v=>v.textContent.trim()).join("\n"),
          fx:(L-r.left)/r.width, fy:(T-r.top)/r.height, fw:(Rr-L)/r.width, fh:(Bb-T)/r.height,
          px:parseFloat(vs.fontSize)||12, pitch,
          color:((+mm[0])<<16|(+mm[1])<<8|(+mm[2])).toString(16).padStart(6,"0") };
      }
      if(statsBox){
        const sb=statsBox.getBoundingClientRect();
        sbox={ x:(sb.left-bRect.left)/bRect.width, y:(sb.top-bRect.top)/bRect.height,
               w:sb.width/bRect.width, h:sb.height/bRect.height, data:null };
      }
      // --- capture carte principale : sans la taille/age ni la boite stats (ajoutees a part) ---
      if(bioEl) bioEl.style.visibility="hidden";
      if(statsBox) statsBox.style.visibility="hidden";
      const cc=await html2canvas(c,{useCORS:true,backgroundColor:null,scale:3,logging:false});
      // --- capture de la boite stats seule (cadre + icones, sans les chiffres) ---
      if(statsBox && sbox){
        statsBox.style.visibility="";
        vEls.forEach(v=>v.style.visibility="hidden");
        const sc=await html2canvas(statsBox,{useCORS:true,backgroundColor:null,scale:3,logging:false});
        sbox.data=sc.toDataURL("image/png");
        vEls.forEach(v=>v.style.visibility="");
      }
      if(bioEl) bioEl.style.visibility="";
      items.push({data:cc.toDataURL("image/png"),
        x:(r.left-bRect.left)/bRect.width, y:(r.top-bRect.top)/bRect.height,
        w:r.width/bRect.width, h:r.height/bRect.height, bio, stats, sbox});
    }
    const aspect=bRect.width/bRect.height, W=13.333, H=Math.round(W/aspect*100)/100;
    const pptx=new PptxGenJS(); pptx.defineLayout({name:"BOARD",width:W,height:H}); pptx.layout="BOARD";
    const s=pptx.addSlide();
    s.background={data:bg.toDataURL("image/png")};   // terrain = fond de diapo (PNG verrouille, non selectionnable dans Keynote)
    items.forEach((it,idx)=>{
      const cx=it.x*W, cy=it.y*H, cw=it.w*W, ch=it.h*H, P="P"+idx+"_";
      s.addImage({data:it.data, x:Math.round(cx*100)/100, y:Math.round(cy*100)/100,
        w:Math.round(cw*100)/100, h:Math.round(ch*100)/100, objectName:P+"card"});
      if(it.sbox && it.sbox.data){
        s.addImage({data:it.sbox.data,
          x:Math.round(it.sbox.x*W*100)/100, y:Math.round(it.sbox.y*H*100)/100,
          w:Math.round(it.sbox.w*W*100)/100, h:Math.round(it.sbox.h*H*100)/100, objectName:P+"statsbox"});
      }
      if(it.bio){
        s.addText(it.bio.text,{
          x:Math.round((cx+it.bio.fx*cw)*100)/100, y:Math.round((cy+it.bio.fy*ch)*100)/100,
          w:Math.round((it.bio.fw*cw)*100)/100, h:Math.round((it.bio.fh*ch)*100)/100,
          align:"center", valign:"middle", margin:0,
          fontFace:"Arial", fontSize:Math.round(it.bio.px*(W/bRect.width)*72*10)/10,
          color:it.bio.color, objectName:P+"bio" });
      }
      if(it.stats){
        const so={ x:Math.round((cx+it.stats.fx*cw)*100)/100, y:Math.round((cy+it.stats.fy*ch)*100)/100,
          w:Math.round((it.stats.fw*cw)*100)/100, h:Math.round((it.stats.fh*ch)*100)/100,
          align:"center", valign:"top", margin:0, bold:true,
          fontFace:"Arial", fontSize:Math.round(it.stats.px*(W/bRect.width)*72*10)/10,
          color:it.stats.color, objectName:P+"stats" };
        if(it.stats.pitch>0) so.lineSpacing=Math.round(it.stats.pitch*(W/bRect.width)*72*10)/10;
        s.addText(it.stats.text, so);
      }
    });
    if(tFrac && tFrac.text){
      s.addText(tFrac.text,{
        x:Math.round(tFrac.x*W*100)/100, y:Math.round(tFrac.y*H*100)/100,
        w:Math.round(tFrac.w*W*100)/100, h:Math.round(tFrac.h*H*100)/100,
        align:"center", valign:"middle", margin:0,
        fontFace:tFrac.face, fontSize:Math.round(tFrac.fontFrac*W*72*10)/10,
        bold:tFrac.bold, color:"FFFFFF",
        charSpacing:Math.round(tFrac.spaceFrac*W*72),
        shadow:{type:"outer",color:"000000",opacity:0.55,blur:4,offset:2,angle:90}, objectName:"TITLE"});
    }
    if(typeof JSZip==="undefined"){ await pptx.writeFile({fileName}); return; }
    // groupage : chaque joueur (carte + boite stats + textes) devient un groupe deplacable dans Keynote
    const blob=await pptx.write({outputType:"blob"});
    const zip=await JSZip.loadAsync(blob);
    let sx=await zip.file("ppt/slides/slide1.xml").async("string");
    sx=groupPlayersInSlideXml(sx);
    zip.file("ppt/slides/slide1.xml",sx);
    const out=await zip.generateAsync({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.presentationml.presentation"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(out); a.download=fileName; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  } finally {
    if(titleEl) titleEl.style.visibility="";
    board.querySelectorAll(".bio, .stats, .stats .v").forEach(e=>e.style.visibility="");
    imgs.forEach((im,i)=>im.src=src0[i]);
    hide.forEach((e,i)=>e.style.display=prevH[i]);
  }
}
function exportPPTX(){ return withBtn("dlk", ()=>pptxLayered("compo_"+slug()+".pptx")); }

/* ---- Override données joueurs : corrige n°/nom, masque les partis (clé = sbId, cf. CLAUDE.md) ---- */
const PLAYER_OVERRIDES = {
  132337: { num: 77, name: "EVERSON JR" }, // était "DA SILVA" #37
  166384: { num: 24 },                     // Junior Ndiaye
  440216: { num: 14 },                     // Victor Orakpo
  30661:  { hide: true },                  // Becir Omeragic (parti)
  32672:  { hide: true },                  // Tanguy Coulibaly (parti)
  29969:  { hide: true },                  // Joris Chotard (parti)
};
function applyPlayerOverrides(data){
  if(!data || !data.teams) return data;
  for(const team of Object.values(data.teams)){
    if(!team || !Array.isArray(team.squad)) continue;
    team.squad = team.squad.filter(p=>{
      const o = p && PLAYER_OVERRIDES[p.sbId];
      if(!o) return true;
      if(o.hide) return false;      // joueur parti → retiré
      Object.assign(p, o);          // applique n°/nom
      return true;
    });
  }
  return data;
}

  formationSelect.onchange=()=>{ buildSlots(formationSelect.value); render(); };
  document.getElementById("dl").onclick=exportPNG;
  document.getElementById("dlk").onclick=exportPPTX;
  render();
}
