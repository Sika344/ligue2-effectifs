# .github/workflows/shotmix.yml
# Régénère shotmix.json (répartition tirs/buts par famille d'attaque) et le committe s'il a changé.
# Pré-requis : secrets de dépôt SB_USERNAME et SB_PASSWORD.
# Placer ce fichier dans .github/workflows/shotmix.yml et build_shotmix.py à la racine du repo.

name: Build repartition tirs et buts

on:
  schedule:
    - cron: "30 5 * * *"       # tous les jours à 05:30 UTC (après xg / inposs / outposs / losses)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-shotmix
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install statsbombpy pandas

      - name: Generate shotmix.json
        env:
          SB_USERNAME: ${{ secrets.SB_USERNAME }}
          SB_PASSWORD: ${{ secrets.SB_PASSWORD }}
        run: python build_shotmix.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain shotmix.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add shotmix.json
            git commit -m "chore: maj shotmix.json (repartition tirs/buts)"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && exit 0
              sleep $((RANDOM % 10 + 3))
            done
            echo "push impossible après 5 tentatives" >&2
            exit 1
          else
            echo "shotmix.json inchangé."
          fi
