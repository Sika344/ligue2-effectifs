name: MAJ effectifs (API-Football, optionnel)
# Source alternative si tu réactives ton compte API-Football.
# Désactivé en auto pour l'instant : on alimente le site via fetch_tm.py (local).
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Récupération des effectifs
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SEASON: "2024"
        run: python fetch_ligue2.py
      - name: Commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "MAJ effectifs (API) $(date +%F)"
          git push
