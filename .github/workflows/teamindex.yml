# .github/workflows/teamindex.yml
# Régénère teamindex.json (index offensif et défensif par équipe) et le committe s'il a changé.
# Pré-requis : secrets de dépôt SB_USERNAME et SB_PASSWORD.
# Placer ce fichier dans .github/workflows/teamindex.yml et build_index.py à la racine du repo.

name: Build index equipes

on:
  schedule:
    - cron: "15 6 * * *"       # tous les jours à 06:15 UTC (après buildup)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-teamindex
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install statsbombpy pandas

      - name: Generate teamindex.json
        env:
          SB_USERNAME: ${{ secrets.SB_USERNAME }}
          SB_PASSWORD: ${{ secrets.SB_PASSWORD }}
        run: python build_index.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain teamindex.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add teamindex.json
            git commit -m "chore: maj teamindex.json (index equipes)"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && exit 0
              sleep $((RANDOM % 10 + 3))
            done
            echo "push impossible après 5 tentatives" >&2
            exit 1
          else
            echo "teamindex.json inchangé."
          fi
