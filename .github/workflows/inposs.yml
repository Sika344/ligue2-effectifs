# .github/workflows/inposs.yml
# Régénère inposs.json (6 KPI in-possession équipe, saison complète) et le committe s'il a changé.
# Pré-requis : secrets de dépôt SB_USERNAME et SB_PASSWORD
#   (Settings → Secrets and variables → Actions → New repository secret).
# Placer ce fichier dans .github/workflows/inposs.yml et build_inposs.py à la racine du repo.

name: Build in-possession KPIs

on:
  schedule:
    - cron: "45 4 * * *"      # tous les jours à 04:45 UTC
  workflow_dispatch: {}        # déclenchement manuel possible

permissions:
  contents: write

concurrency:
  group: build-inposs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install statsbombpy pandas

      - name: Generate inposs.json
        env:
          SB_USERNAME: ${{ secrets.SB_USERNAME }}
          SB_PASSWORD: ${{ secrets.SB_PASSWORD }}
        run: python build_inposs.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain inposs.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add inposs.json
            git commit -m "chore: maj inposs.json (6 KPI in-possession)"

            # push avec rebase-and-retry : inposs (04:45) et outposs (05:00)
            # peuvent se chevaucher ; on évite les rejets non-fast-forward
            # si l'autre workflow vient de pousser sur main.
            pushed=0
            for i in 1 2 3 4 5; do
              if git push; then
                echo "push OK (tentative $i)"
                pushed=1
                break
              fi
              echo "push rejeté (tentative $i) — rebase puis nouvelle tentative…"
              git pull --rebase --autostash origin main || true
              sleep $((RANDOM % 5 + 2))
            done
            [ "$pushed" = 1 ] || { echo "échec du push après 5 tentatives"; exit 1; }
          else
            echo "inposs.json inchangé."
          fi
