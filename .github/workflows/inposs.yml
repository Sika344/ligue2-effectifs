# .github/workflows/inposs.yml
# Régénère inposs.json (6 KPI in-possession équipe, saison complète) et le committe s'il a changé.
# Pré-requis : secrets de dépôt SB_USERNAME et SB_PASSWORD
#   (Settings → Secrets and variables → Actions → New repository secret).
# Placer ce fichier dans .github/workflows/inposs.yml et build_inposs.py à la racine du repo.

name: Build in-possession KPIs

on:
  schedule:
    - cron: "45 4 * * *"      # tous les jours à 04:45 UTC
  workflow_dispatch: {}        # déclenchement manuel possible

permissions:
  contents: write

concurrency:
  group: build-inposs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install statsbombpy pandas

      - name: Generate inposs.json
        env:
          SB_USERNAME: ${{ secrets.SB_USERNAME }}
          SB_PASSWORD: ${{ secrets.SB_PASSWORD }}
        run: python build_inposs.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain inposs.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add inposs.json
            git commit -m "chore: maj inposs.json (6 KPI in-possession)"
            git push
          else
            echo "inposs.json inchangé."
          fi
