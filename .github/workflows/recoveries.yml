# .github/workflows/recoveries.yml
# Régénère recoveries.json (zones de récupération, saison complète) et le committe s'il a changé.
# Pré-requis : secrets de dépôt SB_USERNAME et SB_PASSWORD.
# Placer ce fichier dans .github/workflows/recoveries.yml et build_recoveries.py à la racine du repo.

name: Build zones de recuperation

on:
  schedule:
    - cron: "45 5 * * *"       # tous les jours à 05:45 UTC (après losses / shotmix)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-recoveries
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install statsbombpy pandas

      - name: Generate recoveries.json
        env:
          SB_USERNAME: ${{ secrets.SB_USERNAME }}
          SB_PASSWORD: ${{ secrets.SB_PASSWORD }}
        run: python build_recoveries.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain recoveries.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add recoveries.json
            git commit -m "chore: maj recoveries.json (zones de recuperation)"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && exit 0
              sleep $((RANDOM % 10 + 3))
            done
            echo "push impossible après 5 tentatives" >&2
            exit 1
          else
            echo "recoveries.json inchangé."
          fi
