name: Enrich photos LFP
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python enrich_photos_lfp.py
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add photos_lfp.json
          git commit -m "MAJ photos officielles LFP" || echo "no changes"
          git push
