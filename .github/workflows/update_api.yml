name: Update Ligue 2 (API)
on:
  schedule:
    - cron: '0 6 1,15 * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pycountry
      - name: Fetch squads
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python fetch_api.py
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add ligue2.json
          git commit -m "MAJ effectifs Ligue 2 (API FotMob)" || echo "no changes"
          git push
