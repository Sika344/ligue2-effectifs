function placePlayers(team, side){
  const tmpl=FORMATIONS[team.formation]; const frag=[];
  (team.players||[]).forEach(p=>{
    let d,t,x,y; if(typeof p.x==='number'){d=p.x;t=p.y;} else {const c=(tmpl&&tmpl[p.pos])||[0.5,0.5];d=c[0];t=c[1];}
    if(side==='home'){ x=3+d*0.5*94; y=4+t*92; } else { x=97-d*0.5*94; y=96-t*92; }
    frag.push(`<div class="pl" style="left:${x.toFixed(2)}%;top:${y.toFixed(2)}%">
      <div class="disc" style="background:${team.color}"><span class="num">${p.num}</span><span class="pos">${p.pos}</span></div></div>`);
  });
  return frag.join("");
}
function evt(p){
  let s="";
  if(p.yc) s+=`<span class="yc">${p.yc}'</span>`;
  if(p.rc) s+=`<span class="yc" style="background:#d11;color:#fff">${p.rc}'</span>`;
  if(p.off) s+=`<span class="ev out"><span class="tri"></span>${p.off}'</span>`;
  if(p.on)  s+=`<span class="ev in"><span class="tri"></span>${p.on}'</span>`;
  return s?`<span class="pevt">${s}</span>`:"";
}
function panel(team, side){
  const col=team.color;
  let h=`<div class="phead" style="color:${col}">${side==='home'?"Équipe domicile":"Équipe extérieur"}</div>`;
  if(team.manager){ h+=`<div class="psub">Entraîneur</div><div class="mgr">${team.manager}</div>`; }
  h+=`<div class="psub">Onze de départ</div>`;
  (team.players||[]).forEach(p=>{ h+=`<div class="prow"><span class="pnum" style="color:${col}">${p.num}</span>
    <div class="pinfo"><div class="pn">${p.name}</div><div class="pr">${p.role||""}</div></div>${evt(p)}</div>`; });
  h+=`<div class="psub">Remplaçants</div>`;
  (team.subs||[]).forEach(p=>{ h+=`<div class="prow"><span class="pnum" style="color:${col}">${p.num}</span>
    <div class="pinfo"><div class="pn">${p.name}</div></div>${evt(p)}</div>`; });
  return h;
}
function goalsBlock(H,A){
  const items=[];
  (H.goals||[]).forEach(g=>items.push({c:H.color,n:g.num,m:g.min,og:g.og}));
  (A.goals||[]).forEach(g=>items.push({c:A.color,n:g.num,m:g.min,og:g.og}));
  if(!items.length) return "";
  return `<div class="glab">Buts</div><div class="grow">`+
    items.map(g=>`<div class="gitem"><div class="gdisc" style="background:${g.c}">${g.n}</div><div class="gmin">${g.m}'${g.og?" csc":""}</div></div>`).join("")+`</div>`;
}
function subtitle(m){
  const s=[];
  if(m.kickoff||m.date) s.push(`<b>Coup d'envoi&nbsp;:</b> ${[m.kickoff,m.date].filter(Boolean).join(', ')||'—'}`);
  if(m.venue) s.push(`<span class="sep"></span><b>Stade&nbsp;:</b> ${m.venue}`);
  if(m.comp)  s.push(`<span class="sep"></span>${m.comp}`);
  return s.join(" ");
}
function boardHTML(m, club, col){
  const H=m.home, A=m.away;
  const title=`<span style="color:${H.color}">${H.name} ${H.score}</span><span> – </span><span style="color:${A.color}">${A.score} ${A.name}</span>`;
  return `<div class="brand"><span class="crest" style="background:${col}">${club[0]}</span><span class="word">Rapport pré-match</span></div>
    <div class="mhead"><div class="mtitle">${title}</div><div class="msub">${subtitle(m)}</div></div>
    <div class="sheet">
      <div class="panel left">${panel(H,'home')}</div>
      <div class="panel center">
        <div class="pitchwrap">${PITCH_SVG}<div class="players">${placePlayers(H,'home')+placePlayers(A,'away')}</div></div>
        <div class="fbar"><div>${H.formation?`Formation&nbsp;: <b>${H.formation}</b>`:''}</div><div>${A.formation?`Formation&nbsp;: <b>${A.formation}</b>`:''}</div></div>
        <div class="goals">${goalsBlock(H,A)}</div>
      </div>
      <div class="panel right">${panel(A,'away')}</div>
    </div>`;
}
function clubColor(club){
  for(const m of (DATA.byClub[club]||[])){
    if(m.home.name===club) return m.home.color;
    if(m.away.name===club) return m.away.color;
  }
  return "#0a1733";
}
function slugify(s){ return (s||"").replace(/[^a-z0-9_]+/gi,"_"); }

function renderClub(club){
  const ms=DATA.byClub[club]||[]; const col=clubColor(club);
  document.getElementById("stack").innerHTML = ms.map((m,i)=>{
    return `<div class="matchblock">
      <div class="mbtools"><span class="mlbl">Match ${i+1} · ${m.date} · ${m.home.name} ${m.home.score}-${m.away.score} ${m.away.name}</span>
        <button class="pngbtn" data-i="${i}">⬇ PNG</button></div>
      <div class="board" id="board-${i}">${boardHTML(m, club, col)}</div>
    </div>`;
  }).join("") || `<div class="note">Aucun match pour ce club.</div>`;
  document.getElementById("metaInfo").textContent = `${club} — ${ms.length} derniers matchs`;
  document.querySelectorAll(".pngbtn").forEach(b=> b.onclick=()=>pngBoard(+b.dataset.i, club, b));
}

async function snap(board){ return await html2canvas(board,{useCORS:true,backgroundColor:"#ffffff",scale:2,logging:false}); }
async function pngBoard(i, club, btn){
  const o=btn.textContent; btn.textContent="…"; btn.disabled=true;
  try{ const c=await snap(document.getElementById("board-"+i));
    const a=document.createElement("a"); a.download=`rapport_${slugify(club)}_${i+1}.png`; a.href=c.toDataURL("image/png"); a.click();
  }catch(e){ alert("Export PNG échoué : "+e);} finally{ btn.textContent=o; btn.disabled=false; }
}
document.getElementById("dlk").onclick=async()=>{
  const club=document.getElementById("clubSelect").value;
  const boards=[...document.querySelectorAll(".board")];
  const b=document.getElementById("dlk"), o=b.textContent; b.textContent="…"; b.disabled=true;
  try{
    const pptx=new pptxgenjs(); pptx.defineLayout({name:"L2",width:13.33,height:7.5}); pptx.layout="L2";
    for(const board of boards){ const c=await snap(board);
      const ar=c.width/c.height; let w=12.6,h=w/ar; if(h>7.0){h=7.0;w=h*ar;}
      const s=pptx.addSlide(); s.background={color:"070B16"}; s.addImage({data:c.toDataURL("image/png"),x:(13.33-w)/2,y:(7.5-h)/2,w,h});
    }
    await pptx.writeFile({fileName:`rapport_${slugify(club)}.pptx`});
  }catch(e){ alert("Export échoué : "+e);} finally{ b.textContent=o; b.disabled=false; }
};

const sel=document.getElementById("clubSelect");
sel.innerHTML=DATA.clubs.map(c=>`<option value="${c}">${c}</option>`).join("");
const def = DATA.clubs.includes("Montpellier") ? "Montpellier" : DATA.clubs[0];
sel.value=def; sel.onchange=()=>renderClub(sel.value);
document.getElementById("buildNote").innerHTML="Sélectionne un club en haut à gauche : ses 5 derniers matchs s'affichent à la suite. Export PNG par match, ou Keynote (.pptx) pour les 5.";
renderClub(def);
</script>
</body>
</html>
