<style>
  :root{ --navy:#0a1733; --navy2:#0d1f44; --field:#eef1f5; --line:#b7c0cd; --box:#cad0db; --orange:#ff7a18; }
  .matchblock{max-width:1340px;margin:0 auto 30px;padding:0 12px}
  .mbtools{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 4px;color:#9fb0c8;font-size:13px}
  .mbtools .mlbl{font-weight:700}
  .mbtools button{background:#16234a;color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer}
  #stack{padding-top:8px}
  /* ---- diapo Effectif (repris de l'onglet Effectif) ---- */
  .effboard{position:relative;background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:14px;padding:12px;box-shadow:0 12px 40px rgba(0,0,0,.45);overflow:hidden}
  .effboard .corner{position:absolute;width:30px;height:30px;z-index:5}
  .effboard .corner.tl{top:8px;left:8px;border-top:3px solid var(--gold);border-left:3px solid var(--gold)}
  .effboard .corner.tr{top:8px;right:8px;border-top:3px solid var(--gold);border-right:3px solid var(--gold)}
  .effboard .corner.bl{bottom:8px;left:8px;border-bottom:3px solid var(--gold);border-left:3px solid var(--gold)}
  .effboard .corner.br{bottom:8px;right:8px;border-bottom:3px solid var(--gold);border-right:3px solid var(--gold)}
  .effboard .ehead{position:relative;text-align:center;padding:14px 0;border-bottom:2px solid var(--gold);overflow:hidden;border-radius:8px 8px 0 0}
  .effboard .ebanner{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .effboard .ehead h1{position:relative;z-index:1;font-family:Georgia,"Times New Roman",serif;letter-spacing:.14em;font-size:clamp(24px,4.5vw,42px);font-weight:400;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.55)}
  .effboard .crest{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;display:flex;align-items:center;justify-content:center;z-index:1}
  .effboard .crest img{max-width:52px;max-height:52px;object-fit:contain}
  .effboard .crest.left{left:8px}.effboard .crest.right{right:8px}
  .effboard .pitch{position:relative;width:100%;aspect-ratio:1000/660;margin-top:10px;border-radius:8px;overflow:hidden;background:linear-gradient(180deg,#f3f5f8,#e9edf2)}
  .effboard .pitch svg.lines{position:absolute;inset:0;width:100%;height:100%}
  .effboard .layer{position:absolute;inset:0}
  .effboard .card{position:absolute;transform:translate(-50%,-50%);width:132px;text-align:center;z-index:2}
  .effboard .top{position:relative;height:66px}
  .effboard .idcol{position:absolute;left:2px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:3px;z-index:2}
  .effboard .photo-wrap{height:66px;display:flex;align-items:flex-end;justify-content:center}
  .effboard .photo{height:66px;width:auto;max-width:110px;object-fit:contain;filter:drop-shadow(0 3px 4px rgba(0,0,0,.25))}
  .effboard .jersey{height:60px;width:48px;border-radius:8px;background:linear-gradient(180deg,#22386b,#16284f);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff}
  .effboard .flag{font-size:13px;line-height:1}
  .effboard .num{font-weight:800;font-size:15px;color:var(--ink);border-bottom:2px solid var(--ink);display:inline-block;line-height:1.1;padding:0 2px;min-width:14px}
  .effboard .name{font-weight:800;font-size:12px;color:var(--ink);letter-spacing:.01em;margin-top:3px;line-height:1.05;text-transform:uppercase}

  /* ---- graphiques xG par 15 min ---- */
  /* ---- diapo REPARTITION TIRS / BUTS (pizza charts) ---- */
  .smboard{background:#fff;padding:0}
  .smhead{display:flex;align-items:baseline;gap:12px;padding:14px 18px 4px}
  .smhead .ttl{font-size:20px;font-weight:800;letter-spacing:.06em;color:#0a1733}

  .xgnote{font-size:12px;color:#5a6072;text-align:center;padding:6px 10px 8px;line-height:1.45}

  /* ---- diapo OFFENSIF : zones de pertes adverses ---- */
  .lossboard{background:#fff;padding:0;overflow:hidden}
  .losshead{display:flex;align-items:baseline;gap:12px;padding:14px 18px 10px}
  .losshead .ttl{font-size:20px;font-weight:800;letter-spacing:.06em;color:#0a1733}
  .losshead .sub{font-size:12px;font-weight:600;color:#8a93a6}
  .losswrap{padding:0 18px 6px}
  .lossfoot{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:6px 18px 16px;flex-wrap:wrap}
  .lossleg{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;color:#8a93a6}
  .lossleg i{display:inline-block;width:26px;height:11px;border-radius:2px;box-shadow:inset 0 0 0 1px rgba(10,23,51,.14)}
  .lossnote{font-size:11.5px;color:#8a93a6;font-weight:600;max-width:62%}
  /* ---- diapo IN-POSSESSION (strip plots équipe) ---- */
  .inpboard{background:#fff;padding:0}
  .inphead{background:var(--navy,#0a1733);color:#fff;display:flex;align-items:baseline;gap:12px;padding:13px 18px;border-bottom:3px solid var(--gold,#c9a24b)}

  .inpgrid{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .inppanel{position:relative;border-right:1px solid #eceef2;border-bottom:1px solid #eceef2;padding:10px 14px 4px}
  .inppanel:nth-child(2n){border-right:none}
  .inptitle{font-size:14px;font-weight:800;color:#1b2340;margin:0 0 2px;font-family:"Segoe UI",Arial,sans-serif}
  .inpplot{position:relative}
  .inpplot svg{display:block;width:100%;height:auto}
  .inpovl{position:absolute;inset:0;pointer-events:none}
  .inplogo{position:absolute;width:var(--cw);aspect-ratio:1;display:flex;align-items:center;justify-content:center}
  .inplogo img{width:100%;height:100%;object-fit:contain}
  .inplogo.dim{opacity:.5}                                                        /* clubs non sélectionnés estompés */

</style>
</head>

function roleOf(p){
  const d=((p.posDesc||"").split(",")[0]||"").toUpperCase();
  if(p.pos==="GK"||d==="GK") return "GK";
  if(["LB","LWB"].includes(d)) return "DL";
  if(["RB","RWB"].includes(d)) return "DR";
  if(d==="CB") return "DC";
  if(["CDM","DM"].includes(d)) return "DM";
  if(["LM","LW"].includes(d)) return "ML";
  if(["RM","RW"].includes(d)) return "MR";
  if(["CAM","AM","CM","SS"].includes(d)) return "MC";
  if(["ST","CF","FW"].includes(d)) return "AT";
  if(p.pos==="DEF") return "DC"; if(p.pos==="MID") return "MC"; if(p.pos==="ATT") return "AT"; return "MC";
}
function placements(list){
  const B={GK:[],DC:[],DL:[],DR:[],DM:[],MC:[],ML:[],MR:[],AT:[]};
  list.forEach(p=>B[roleOf(p)].push(p));
  Object.values(B).forEach(a=>a.sort((x,y)=>(x.num||999)-(y.num||999)));
  const out=[];
  const H=(arr,y,cx,maxW)=>{const n=arr.length; if(!n)return; const w=Math.min(maxW,n*10);
    arr.forEach((p,i)=>{const x=n===1?cx:cx-w/2+w*(i+0.5)/n; out.push({p,x,y});});};
  const V=(arr,x,yc,sp)=>{const n=arr.length; if(!n)return; arr.forEach((p,i)=>{const y=yc-(n-1)*sp/2+i*sp; out.push({p,x,y});});};
  H(B.GK,12,50,34); H(B.DC,27,50,40); V(B.DL,88,42,11); V(B.DR,12,42,11);
  H(B.DM,48,50,22); H(B.MC,64,50,58); V(B.ML,91,70,11); V(B.MR,9,70,11); H(B.AT,85,50,46);
  return out;
}

function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g," ").replace(/\b(fc|sc|us|as|stade|de|du|foot|club)\b/g," ").replace(/\s+/g," ").trim(); }
function matchTeam(club, names){
  const a=norm(club);
  for(const t of names) if(norm(t)===a) return t;
  for(const t of names){ const b=norm(t); if(b&&(a.includes(b)||b.includes(a))) return t; }
  for(const t of names){ const b=norm(t); const at=a.split(" "),bt=b.split(" ");
    if(at.some(x=>x.length>=4 && bt.some(y=>y.startsWith(x)||x.startsWith(y)))) return t; }
  return null;
}

function xgBuckets(club){

    if(k && XG.teams[k]){

function niceStep(x){ if(!isFinite(x)||x<=0) return 1;
  const p=Math.pow(10,Math.floor(Math.log10(x))), n=x/p; let m;
  if(n<1.5)m=1; else if(n<3)m=2; else if(n<4)m=2.5; else if(n<7.5)m=5; else m=10; return m*p; }
function fmtVal(v){ return (+(+v).toFixed(2)).toString(); }
function xgScale(vals){
  const realMax=Math.max(0,...vals), maxV=Math.max(realMax,1e-4);
  const top=Math.max(maxV*1.06, niceStep(maxV/4));
  const step=niceStep(maxV/4); let ticks=[0];
  if(realMax>0){ for(let t=step; t<=realMax+1e-9 && ticks.length<14; t+=step) ticks.push(+t.toFixed(6)); }
  const seen=new Set(), tk=[]; ticks.forEach(t=>{const l=fmtVal(t); if(!seen.has(l)){seen.add(l);tk.push(t);}});
  return {top, ticks:tk};
}
function barChartSVG(title, vals, accent, scale){
  const W=1060,H=372,padL=66,padR=18,padT=58,padB=46;
  const x0=padL, x1=W-padR, y0=padT, y1=H-padB, plotW=x1-x0, plotH=y1-y0;
  const labels=['xg 0-15','xg 15-30','xg 30-45','xg 45-60','xg 60-75','xg 75-90'];
  const sc = scale || xgScale(vals);   // échelle passée (commune) ou calculée localement
  const top=sc.top, ticks=sc.ticks;
  const Y=v=> y1-(v/top)*plotH;
  let g='';
  ticks.forEach(t=>{ const y=Y(t);
    g+=`<line x1="${x0}" y1="${y.toFixed(1)}" x2="${x1}" y2="${y.toFixed(1)}" stroke="#d6d6d6" stroke-width="1"/>`;
    g+=`<text x="${x0-10}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="15" fill="#666" font-family="Segoe UI,Arial,sans-serif">${fmtVal(t)}</text>`; });
  const slot=plotW/6, bw=slot*0.6;
  vals.forEach((v,i)=>{ const cx=x0+slot*(i+0.5), bx=cx-bw/2, by=Y(Math.max(0,v)), bh=Math.max(0,y1-by);
    g+=`<line x1="${cx.toFixed(1)}" y1="${y0}" x2="${cx.toFixed(1)}" y2="${y1}" stroke="#e3e3e3" stroke-width="1"/>`;
    g+=`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="4" fill="${accent}"/>`;
    g+=`<text x="${cx.toFixed(1)}" y="${(by-9).toFixed(1)}" text-anchor="middle" font-size="20" font-weight="700" fill="#1a2240" font-family="Segoe UI,Arial,sans-serif">${fmtVal(v)}</text>`;
    g+=`<text x="${cx.toFixed(1)}" y="${(y1+22).toFixed(1)}" text-anchor="middle" font-size="14" fill="#555" font-family="Segoe UI,Arial,sans-serif">${labels[i]}</text>`; });
  g=`<text x="${x0-2}" y="32" font-size="22" font-weight="800" fill="#1b2340" font-family="Segoe UI,Arial,sans-serif">${title}</text>`+g;
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${title}"><rect x="0" y="0" width="${W}" height="${H}" fill="#ececec"/>${g}</svg>`;
}

function smPie(title, counts, total, sub){
  const S=460, cx=S/2, cy=S/2+6, R=150, LR=R+30;
  const head='<text x="'+cx+'" y="24" text-anchor="middle" font-size="19" font-weight="800" fill="#0a1733" font-family="Segoe UI,Arial,sans-serif">'+title+'</text>'+
    '<text x="'+cx+'" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#8a93a6" font-family="Segoe UI,Arial,sans-serif">'+sub+'</text>';
  if(!total){
    return '<svg viewBox="0 0 '+S+' '+(S+30)+'" xmlns="http://www.w3.org/2000/svg">'+head+
      '<text x="'+cx+'" y="'+cy+'" text-anchor="middle" font-size="15" fill="#8a93a6" font-family="Segoe UI,Arial,sans-serif">aucune donnée</text></svg>';
  }
  let a0=-Math.PI/2, parts="", labs="";
  SM_KEYS.forEach(k=>{
    const v=(counts&&counts[k])||0; if(!v) return;
    const frac=v/total, a1=a0+frac*2*Math.PI;
    const x0=cx+R*Math.cos(a0), y0=cy+R*Math.sin(a0);
    const x1=cx+R*Math.cos(a1), y1=cy+R*Math.sin(a1);
    const big=(a1-a0)>Math.PI?1:0;
    if(frac>0.999){
      parts+='<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="'+SM_COLORS[k]+'" stroke="#fff" stroke-width="3"/>';
    }else{
      parts+='<path d="M'+cx+' '+cy+' L'+x0.toFixed(1)+' '+y0.toFixed(1)+
        ' A'+R+' '+R+' 0 '+big+' 1 '+x1.toFixed(1)+' '+y1.toFixed(1)+' Z" fill="'+SM_COLORS[k]+'" stroke="#fff" stroke-width="3"/>';
    }
    const am=(a0+a1)/2, pct=Math.round(frac*100);
    if(frac>=0.07){
      const lx=cx+(R*0.62)*Math.cos(am), ly=cy+(R*0.62)*Math.sin(am);
      labs+='<text x="'+lx.toFixed(1)+'" y="'+(ly+7).toFixed(1)+'" text-anchor="middle" font-size="26" font-weight="800" fill="#fff" font-family="Segoe UI,Arial,sans-serif">'+pct+'%</text>';
    }else{
      const lx=cx+LR*Math.cos(am), ly=cy+LR*Math.sin(am);
      const anch=Math.cos(am)>=0?"start":"end";
      labs+='<line x1="'+(cx+R*Math.cos(am)).toFixed(1)+'" y1="'+(cy+R*Math.sin(am)).toFixed(1)+'" x2="'+lx.toFixed(1)+'" y2="'+ly.toFixed(1)+'" stroke="'+SM_COLORS[k]+'" stroke-width="2"/>'+
        '<text x="'+(lx+(anch==="start"?5:-5)).toFixed(1)+'" y="'+(ly+5).toFixed(1)+'" text-anchor="'+anch+'" font-size="17" font-weight="800" fill="'+SM_COLORS[k]+'" font-family="Segoe UI,Arial,sans-serif">'+pct+'%</text>';
    }
    a0=a1;
  });
  return '<svg viewBox="0 0 '+S+' '+(S+30)+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="'+title+'">'+head+parts+labs+'</svg>';
}

/* écussons de secours pour les équipes montées/descendues absentes de ligue2.json (clé = nom StatsBomb) */
const INP_CRESTS = {
  "Troyes":   "https://images.fotmob.com/image_resources/logo/teamlogo/10242.png", // ESTAC (montée)
  "Le Mans":  "https://images.fotmob.com/image_resources/logo/teamlogo/8682.png",  // Le Mans (montée)

/* logo d'une équipe inposs : ligue2.json (nom LFP) sinon carte de secours */
function inpLogo(inpName){
  if(LIGUE2 && LIGUE2.teams){
    if(LIGUE2.teams[inpName] && LIGUE2.teams[inpName].logo) return LIGUE2.teams[inpName].logo;
    const k = matchTeam(inpName, Object.keys(LIGUE2.teams));
    if(k && LIGUE2.teams[k] && LIGUE2.teams[k].logo) return LIGUE2.teams[k].logo;
  }
  return INP_CRESTS[inpName] || "";
}
function inpRows(kpi, selClub, SRC){
  SRC = SRC || INP;
  if(!SRC || !SRC.teams) return null;
  const selN = norm(selClub || "Montpellier");
  const rows=[];
  for(const [name, t] of Object.entries(SRC.teams)){
    const v = t ? t[kpi] : null;
    if(v==null || isNaN(v)) continue;
    rows.push({ name, val:+v, logo:inpLogo(name), sel:norm(name)===selN });
  }
  return rows.length ? rows : null;
}
function inpPercentile(sortedAsc, p){
  if(!sortedAsc.length) return 0;
  const idx=(sortedAsc.length-1)*p, lo=Math.floor(idx), hi=Math.ceil(idx);
  if(lo===hi) return sortedAsc[lo];
  return sortedAsc[lo] + (sortedAsc[hi]-sortedAsc[lo])*(idx-lo);
}
function inpFmt(v, suffix){
  const a=Math.abs(v); let s;
  if(a>=100) s=Math.round(v).toString();
  else if(a>=10) s=(Math.round(v*10)/10).toString();
  else s=(Math.round(v*100)/100).toString();
  return s + (suffix||"");
}
/* un panneau = SVG (axe, P50/P90, ticks) + overlay HTML des écussons (export OK via inline <img>) */
function inpPanelHTML(kpi, selClub, SRC, SUBS, SUFS){
  SRC = SRC || INP; SUBS = SUBS || INP_SUBTITLE; SUFS = SUFS || INP_SUFFIX;
  const suffix = SUFS[kpi]||"";
  const rows = inpRows(kpi, selClub, SRC);
  const sub = SUBS[kpi]||"";
  if(!rows){
    return '<div class="inppanel"><div class="inptitle">'+kpi+'</div>'+
      '<div style="font-size:12px;color:#8a93a6;padding:14px 2px">Données indisponibles.</div></div>';
  }
  const VBW=520, VBH=116, Lx=30, Rx=30, plotW=VBW-Lx-Rx;
  const by=80, topY=16, axisBot=96;           // baseline UNIQUE (style strip plot StatsBomb)
  const CW=4.5;                               // largeur écusson (% de la largeur du panneau)
  const crestVB=CW/100*VBW, minGap=crestVB;   // écart mini = les écussons se touchent, restent lisibles

  const vals=rows.map(r=>r.val);
  let mn=Math.min(...vals), mx=Math.max(...vals);
  if(mn===mx){ mn-=1; mx+=1; }
  const pad=(mx-mn)*0.06 || 1, lo=mn-pad, hi=mx+pad;
  const xOf=v=> Lx + ((v-lo)/(hi-lo))*plotW;

  const asc=[...vals].sort((a,b)=>a-b);
  const p50=inpPercentile(asc,0.5), p90=inpPercentile(asc,0.9);

  let g='';
  // baseline
  g+='<line x1="'+Lx+'" y1="'+by+'" x2="'+(VBW-Rx)+'" y2="'+by+'" stroke="#d8dbe2" stroke-width="1.5"/>';
  // ticks X
  for(let i=0;i<=3;i++){ const v=lo+(hi-lo)*i/3, x=xOf(v);
    g+='<line x1="'+x.toFixed(1)+'" y1="'+by+'" x2="'+x.toFixed(1)+'" y2="'+(by+5)+'" stroke="#c5cad4" stroke-width="1"/>';
    g+='<text x="'+x.toFixed(1)+'" y="'+(axisBot+10)+'" text-anchor="middle" font-size="12.5" fill="#7a8294" font-family="Segoe UI,Arial,sans-serif">'+inpFmt(v,suffix)+'</text>';
  }
  // P50 / P90
  [["P50",p50],["P90",p90]].forEach(([lab,pv])=>{ const x=xOf(pv);
    g+='<line x1="'+x.toFixed(1)+'" y1="'+topY+'" x2="'+x.toFixed(1)+'" y2="'+(by+4)+'" stroke="#9aa3b5" stroke-width="1.2" stroke-dasharray="4 3"/>';
    g+='<text x="'+x.toFixed(1)+'" y="'+(topY-5)+'" text-anchor="middle" font-size="11" font-weight="700" fill="#9aa3b5" font-family="Segoe UI,Arial,sans-serif">'+lab+'</text>';
  });

  // placement écussons — LIGNE UNIQUE sur la baseline (style StatsBomb IQ).
  // Dodge horizontal minimal : logos opaques -> on les fait se toucher plutôt que se chevaucher.
  const placed = rows.map(r=>({...r, x0:xOf(r.val), x:xOf(r.val)})).sort((a,b)=>a.x0-b.x0);
  // passe vers la droite : garantit l'écart mini
  let prev=-1e9; for(const p of placed){ p.x=Math.max(p.x0, prev+minGap); prev=p.x; }
  // recadre si le paquet déborde (droite puis gauche)
  const rEdge=VBW-Rx, lEdge=Lx;
  if(placed.length){ const ov=placed[placed.length-1].x-rEdge; if(ov>0) for(const p of placed) p.x-=ov; }
  if(placed.length && placed[0].x<lEdge){ const sh=lEdge-placed[0].x; for(const p of placed) p.x+=sh; }
  const cy=by;                                 // tous les écussons alignés sur la même baseline
  const ovl = placed.map(p=>{
    const left = (p.x/VBW*100) - CW/2;
    const top  = (cy/VBH*100) - (CW*(VBW/VBH))/2;
    const cls = "inplogo"+(p.sel?" sel":" dim");
    const title = p.name+" · "+inpFmt(p.val,suffix);
    const img = p.logo ? '<img src="'+p.logo+'" alt="'+p.name+'" loading="eager">' : '';
    return '<span class="'+cls+'" style="left:'+left.toFixed(2)+'%;top:'+top.toFixed(2)+'%" title="'+title+'">'+img+'</span>';
  }).join("");

  const svg='<svg viewBox="0 0 '+VBW+' '+VBH+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="'+kpi+'"><rect x="0" y="0" width="'+VBW+'" height="'+VBH+'" fill="#fbfcfe"/>'+g+'</svg>';
  return '<div class="inppanel" style="--cw:'+CW+'%">'+
    '<div class="inptitle">'+kpi+(sub?' <span style="font-weight:600;color:#8a93a6;font-size:11.5px">· '+sub+'</span>':'')+'</div>'+
    '<div class="inpplot">'+svg+'<div class="inpovl">'+ovl+'</div></div></div>';
}

/* ===== Diapo OFFENSIF — zones de pertes de l'adversaire (depuis losses.json) ===== */
let LOSS = null;   // contenu de losses.json (auto-actualisé par une GitHub Action)
const LOSS_PALETTE = ["#ffffff","#fdeceb","#fbd5d2","#f7b8b3","#f29892","#ea7871","#e05a53","#d13d36","#b62a24","#8f1c17"];
function lossStep(v,lo,hi){
  if(!v) return 0;
  const t = hi>lo ? (v-lo)/(hi-lo) : 1;
  return Math.min(9,Math.max(1,1+Math.round(Math.pow(Math.min(1,Math.max(0,t)),0.85)*8)));
}
function lossInk(st){ return st>=6 ? "#ffffff" : "#6b1410"; }
function lossRnd(seed){ let s=seed>>>0; return function(){ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }
function lossPitchSVG(grid, cols, rows, matches, subs){
  const S=10, W=120*S, H=80*S, cw=W/cols, ch=H/rows;
  let hi=0, lo=Infinity;
  grid.forEach(r=>r.forEach(v=>{ if(v>hi) hi=v; if(v>0&&v<lo) lo=v; }));
  if(lo===Infinity) lo=0;
  let cells="", dots="", labels="";
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const v=(grid[r]&&grid[r][c])||0, st=lossStep(v,lo,hi), x=c*cw, y=r*ch;
      cells+='<rect x="'+x+'" y="'+y+'" width="'+cw+'" height="'+ch+'" fill="'+LOSS_PALETTE[st]+'"/>';
      if(st>0){
        const rnd=lossRnd((r*97+c*31+7)*2654435761);
        const n=Math.round(10+(st/9)*104);
        const bx=x+cw/2-56, by=y+ch/2-30, bw=112, bh=60;
        let d="";
        for(let i=0;i<n;i++){
          const px=x+6+rnd()*(cw-12), py=y+6+rnd()*(ch-12);
          if(px>bx&&px<bx+bw&&py>by&&py<by+bh) continue;
          d+='M'+px.toFixed(1)+' '+py.toFixed(1)+'m-3.1 0a3.1 3.1 0 1 0 6.2 0a3.1 3.1 0 1 0 -6.2 0';
        }
        dots+='<path d="'+d+'" fill="#fff" opacity=".85"/>';
      }
      const ink=lossInk(st);
      const pm=(subs&&subs[r]&&subs[r][c]!=null)?subs[r][c]:((matches?(v/matches).toFixed(1):"0.0")+"/m");
      labels+='<text x="'+(x+cw/2)+'" y="'+(y+ch/2-1)+'" text-anchor="middle" font-size="38" font-weight="700" fill="'+ink+'" font-family="Times New Roman,Times,serif">'+v+'</text>'+
        '<text x="'+(x+cw/2)+'" y="'+(y+ch/2+26)+'" text-anchor="middle" font-size="19" fill="'+ink+'" opacity=".78" font-family="Times New Roman,Times,serif">'+pm+'</text>';
    }
  }
  const L='stroke="#b9c4d1" stroke-width="3" fill="none"';
  let g='';
  g+='<rect x="0" y="0" width="'+W+'" height="'+H+'" '+L+'/>';
  g+='<line x1="'+(W/2)+'" y1="0" x2="'+(W/2)+'" y2="'+H+'" '+L+'/>';
  g+='<circle cx="'+(W/2)+'" cy="'+(H/2)+'" r="'+(9.15*S)+'" '+L+'/>';
  g+='<circle cx="'+(W/2)+'" cy="'+(H/2)+'" r="4.5" fill="#b9c4d1"/>';
  const by=(80-40.3)/2*S, bh=40.3*S, bw=16.5*S, sy=(80-18.3)/2*S, sh=18.3*S, sw=5.5*S;
  g+='<rect x="0" y="'+by+'" width="'+bw+'" height="'+bh+'" '+L+'/>';
  g+='<rect x="'+(W-bw)+'" y="'+by+'" width="'+bw+'" height="'+bh+'" '+L+'/>';
  g+='<rect x="0" y="'+sy+'" width="'+sw+'" height="'+sh+'" '+L+'/>';
  g+='<rect x="'+(W-sw)+'" y="'+sy+'" width="'+sw+'" height="'+sh+'" '+L+'/>';
  g+='<circle cx="'+(11*S)+'" cy="'+(H/2)+'" r="4.5" fill="#b9c4d1"/>';
  g+='<circle cx="'+(W-11*S)+'" cy="'+(H/2)+'" r="4.5" fill="#b9c4d1"/>';
  const gy=(80-7.32)/2*S, gh=7.32*S;
  g+='<rect x="-14" y="'+gy+'" width="14" height="'+gh+'" fill="#b9c4d1"/>';
  g+='<rect x="'+W+'" y="'+gy+'" width="14" height="'+gh+'" fill="#b9c4d1"/>';
  return '<svg viewBox="-20 -62 '+(W+40)+' '+(H+84)+'" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zones de pertes">'+
    '<line x1="0" y1="-32" x2="182" y2="-32" stroke="#0a1733" stroke-width="4"/>'+
    '<path d="M182,-41 L208,-32 L182,-23 Z" fill="#0a1733"/>'+
    '<text x="222" y="-26" font-size="26" fill="#0a1733" font-family="Times New Roman,Times,serif">sens du jeu</text>'+
    cells+dots+g+labels+'</svg>';
}

async function toDataURL(url){ const proxy="https://images.weserv.nl/?url="+encodeURIComponent(url)+"&output=png";

}

      const vEls=[...c.querySelectorAll(".stats .v")]; let stats=null;
      if(vEls.length){
        let L=Infinity,T=Infinity,Rr=-Infinity,Bb=-Infinity;
        vEls.forEach(v=>{const q=v.getBoundingClientRect();L=Math.min(L,q.left);T=Math.min(T,q.top);Rr=Math.max(Rr,q.right);Bb=Math.max(Bb,q.bottom);});
        const vs=getComputedStyle(vEls[0]); const mm=(vs.color.match(/\d+/g)||[230,126,34]);
        let pitch=0;
        if(vEls.length>=2){const a0=vEls[0].getBoundingClientRect(),a1=vEls[1].getBoundingClientRect();pitch=((a1.top+a1.bottom)-(a0.top+a0.bottom))/2;}
        stats={ text:vEls.map(v=>v.textContent.trim()).join("\n"),
          fx:(L-r.left)/r.width, fy:(T-r.top)/r.height, fw:(Rr-L)/r.width, fh:(Bb-T)/r.height,
          px:parseFloat(vs.fontSize)||12, pitch,
          color:((+mm[0])<<16|(+mm[1])<<8|(+mm[2])).toString(16).padStart(6,"0") };
      }
      vEls.forEach(v=>v.style.visibility="hidden");
      const cc=await html2canvas(c,{useCORS:true,backgroundColor:null,scale:3,logging:false});
      vEls.forEach(v=>v.style.visibility="");
      items.push({ data:cc.toDataURL("image/png"),
        x:(r.left-bRect.left)/bRect.width, y:(r.top-bRect.top)/bRect.height,
        w:r.width/bRect.width, h:r.height/bRect.height, stats });
    }
    const prev=layer.style.display; layer.style.display="none";
    const bg=await html2canvas(board,{useCORS:true,backgroundColor:null,scale:2,logging:false});
    layer.style.display=prev;
    return { kind:"eff", bg:bg.toDataURL("image/png"), items, ar:bRect.width/bRect.height, bw:bRect.width };
  }

  // --- feuille de match : pastilles joueurs (mesurees ici, dessinees en vectoriel dans le pptx) ---
  const pl=board.querySelector(".players");
  const toks=pl?[...pl.querySelectorAll(".pl")]:[];
  if(pl && toks.length){
    const discs=[];
    for(const t of toks){
      const d=t.querySelector(".disc"); if(!d) continue;
      const r=d.getBoundingClientRect();
      const cs=getComputedStyle(d); const mm=(cs.backgroundColor.match(/\d+/g)||[20,20,20]);
      const numEl=t.querySelector(".num"), posEl=t.querySelector(".pos");
      discs.push({
        cx:((r.left+r.right)/2-bRect.left)/bRect.width,
        cy:((r.top+r.bottom)/2-bRect.top)/bRect.height,
        d:r.width/bRect.width,
        num:numEl?numEl.textContent.trim():"", pos:posEl?posEl.textContent.trim():"",
        color:((+mm[0])<<16|(+mm[1])<<8|(+mm[2])).toString(16).padStart(6,"0"),
        numPx:numEl?parseFloat(getComputedStyle(numEl).fontSize)||16:16,
        posPx:posEl?parseFloat(getComputedStyle(posEl).fontSize)||8:8
      });
    }
    // titre mesure puis masque : html2canvas casse le gros titre gras -> redessine en natif
    const titleEl=board.querySelector(".mtitle"); let title=null;
    if(titleEl){
      const tr=titleEl.getBoundingClientRect(), ts=getComputedStyle(titleEl);
      const runs=[...titleEl.children].map(sp=>{ const c=(getComputedStyle(sp).color.match(/\d+/g)||[20,20,20]);
        return { text:(sp.textContent||"").replace(/\u00a0/g," "),
          color:((+c[0])<<16|(+c[1])<<8|(+c[2])).toString(16).padStart(6,"0") }; });
      title={ runs, y:(tr.top-bRect.top)/bRect.height, h:tr.height/bRect.height,
        px:parseFloat(ts.fontSize)||28, face:(ts.fontFamily.split(",")[0]||"Arial").replace(/["']/g,"").trim() };
    }
    const prevP=pl.style.display; pl.style.display="none";
    const prevT=titleEl?titleEl.style.visibility:""; if(titleEl) titleEl.style.visibility="hidden";
    const bg=await html2canvas(board,{useCORS:true,backgroundColor:null,scale:2,logging:false});
    pl.style.display=prevP; if(titleEl) titleEl.style.visibility=prevT;
    return { kind:"match", bg:bg.toDataURL("image/png"), discs, title, ar:bRect.width/bRect.height, bw:bRect.width };
  }

  // --- repli image plate ---
  const c=await html2canvas(board,{useCORS:true,backgroundColor:null,scale:2,logging:false});
  return {flat:c};
}
/* groupage Keynote : tout objet nomme P<n>_* est regroupe par joueur (carte + chiffres) en un groupe deplacable. */
function groupPlayersInSlideXml(xml){
  const NSP="http://schemas.openxmlformats.org/presentationml/2006/main";
  const NSA="http://schemas.openxmlformats.org/drawingml/2006/main";
  const doc=new DOMParser().parseFromString(xml,"application/xml");
  const spTree=doc.getElementsByTagName("p:spTree")[0]; if(!spTree) return xml;
  const kids=[];
  for(let n=spTree.firstChild;n;n=n.nextSibling){ if(n.nodeType===1 && (n.tagName==="p:pic"||n.tagName==="p:sp")) kids.push(n); }
  let maxId=1; const cnv=doc.getElementsByTagName("p:cNvPr");
  for(let i=0;i<cnv.length;i++){ const v=parseInt(cnv[i].getAttribute("id")||"0",10); if(v>maxId)maxId=v; }
  const nameOf=node=>{ const c=node.getElementsByTagName("p:cNvPr")[0]; return c?(c.getAttribute("name")||""):""; };
  const xfrmOf=node=>{ const x=node.getElementsByTagName("a:off")[0],e=node.getElementsByTagName("a:ext")[0];
    return (x&&e)?{x:+x.getAttribute("x"),y:+x.getAttribute("y"),cx:+e.getAttribute("cx"),cy:+e.getAttribute("cy")}:null; };
  const groups=new Map(), order=[];
  kids.forEach(node=>{ const m=nameOf(node).match(/^P(\d+)_/);
    if(m){ const k=m[1]; if(!groups.has(k)){groups.set(k,[]);order.push(k);} groups.get(k).push(node); } });
  const el=(ns,n,attrs)=>{ const e=doc.createElementNS(ns,n); if(attrs)for(const a in attrs)e.setAttribute(a,String(attrs[a])); return e; };
  order.forEach(k=>{
    const nodes=groups.get(k); if(nodes.length<2) return;
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    nodes.forEach(nd=>{ const f=xfrmOf(nd); if(!f)return; minX=Math.min(minX,f.x);minY=Math.min(minY,f.y);maxX=Math.max(maxX,f.x+f.cx);maxY=Math.max(maxY,f.y+f.cy); });
    if(!isFinite(minX)) return;
    const gx=minX,gy=minY,gcx=maxX-minX,gcy=maxY-minY;
    const grp=el(NSP,"p:grpSp");
    const nv=el(NSP,"p:nvGrpSpPr");
    nv.appendChild(el(NSP,"p:cNvPr",{id:++maxId,name:"Joueur "+k}));
    nv.appendChild(el(NSP,"p:cNvGrpSpPr")); nv.appendChild(el(NSP,"p:nvPr"));
    const pr=el(NSP,"p:grpSpPr"); const xf=el(NSA,"a:xfrm");
    xf.appendChild(el(NSA,"a:off",{x:gx,y:gy})); xf.appendChild(el(NSA,"a:ext",{cx:gcx,cy:gcy}));
    xf.appendChild(el(NSA,"a:chOff",{x:gx,y:gy})); xf.appendChild(el(NSA,"a:chExt",{cx:gcx,cy:gcy}));
    pr.appendChild(xf); grp.appendChild(nv); grp.appendChild(pr);
    spTree.insertBefore(grp,nodes[0]);
    nodes.forEach(nd=>{ spTree.removeChild(nd); grp.appendChild(nd); });
  });
  return new XMLSerializer().serializeToString(doc);
}
async function pngBoard(boardId, club, btn){
  const o=btn.textContent; btn.textContent="…"; btn.disabled=true;
  try{ const c=await snap(document.getElementById(boardId));
    const tag = boardId==="board-eff" ? "effectif" : boardId==="board-xg" ? "xg_15min" : boardId==="board-inposs" ? "in_possession" : boardId==="board-outposs" ? "out_of_possession" : ("match_"+(boardId.split("-")[1]*1+1));
    const a=document.createElement("a"); a.download=`${slugify(club)}_${tag}.png`; a.href=c.toDataURL("image/png"); a.click();
  }catch(e){ alert("Export PNG échoué : "+e);} finally{ btn.textContent=o; btn.disabled=false; }
}
document.getElementById("dlk").onclick=async()=>{
  const club=document.getElementById("clubSelect").value;
  const boards=[...document.querySelectorAll(".board-snap")];
  const b=document.getElementById("dlk"), o=b.textContent; b.textContent="…"; b.disabled=true;
  try{ const pptx=new (window.PptxGenJS||window.pptxgenjs||window.pptxgen)(); pptx.defineLayout({name:"L2",width:13.33,height:7.5}); pptx.layout="L2";
    let needGroup=false;
    for(const board of boards){ const L=await snapLayeredBoard(board);
      const s=pptx.addSlide(); s.background={color:"070B16"};
      if(L.flat){ const ar=L.flat.width/L.flat.height; let w=12.6,h=w/ar; if(h>7.0){h=7.0;w=h*ar;}
        s.addImage({data:L.flat.toDataURL("image/png"),x:(13.33-w)/2,y:(7.5-h)/2,w,h}); continue; }
      let W=12.6,H=W/L.ar; if(H>7.0){H=7.0;W=H*L.ar;}
      const X=(13.33-W)/2, Y=(7.5-H)/2;
      s.addImage({data:L.bg,x:X,y:Y,w:W,h:H,objectName:"terrain"});
      if(L.kind==="match"){
        const k=W/L.bw; const ELL=(pptx.ShapeType&&pptx.ShapeType.ellipse)||"ellipse";
        L.discs.forEach((dd,idx)=>{
          const diam=dd.d*W, ex=X+dd.cx*W-diam/2, ey=Y+dd.cy*H-diam/2;
          s.addText(
            [{text:dd.num,options:{fontSize:Math.round(dd.numPx*k*72*10)/10,bold:true,breakLine:true}},
             {text:dd.pos,options:{fontSize:Math.round(dd.posPx*k*72*10)/10,bold:true}}],
            { shape:ELL, x:Math.round(ex*100)/100, y:Math.round(ey*100)/100,
              w:Math.round(diam*100)/100, h:Math.round(diam*100)/100,
              fill:{color:dd.color}, line:{type:"none"}, align:"center", valign:"middle",
              color:"FFFFFF", margin:0, objectName:"tok"+idx });
        });
        if(L.title && L.title.runs.length){
          const T=L.title, runs=T.runs.map(r=>({text:r.text,options:{color:r.color}}));
          s.addText(runs,{ x:Math.round(X*100)/100, y:Math.round((Y+T.y*H)*100)/100,
            w:Math.round(W*100)/100, h:Math.round(T.h*H*100)/100,
            align:"center", valign:"middle", margin:0, bold:true,
            fontFace:T.face||"Arial", fontSize:Math.round(T.px*k*72*10)/10, objectName:"titre" });
        }
      } else { // eff : carte + chiffres editables, groupes par joueur
        const k=W/L.bw;
        L.items.forEach((it,idx)=>{
          const cx=X+it.x*W, cy=Y+it.y*H, cw=it.w*W, ch=it.h*H, P="P"+idx+"_";
          s.addImage({data:it.data, x:Math.round(cx*100)/100, y:Math.round(cy*100)/100,
            w:Math.round(cw*100)/100, h:Math.round(ch*100)/100, objectName:P+"card"});
          if(it.stats){
            const so={ x:Math.round((cx+it.stats.fx*cw)*100)/100, y:Math.round((cy+it.stats.fy*ch)*100)/100,
              w:Math.round((it.stats.fw*cw)*100)/100, h:Math.round((it.stats.fh*ch)*100)/100,
              align:"center", valign:"top", margin:0, bold:true,
              fontFace:"Arial", fontSize:Math.round(it.stats.px*k*72*10)/10,
              color:it.stats.color, objectName:P+"stats" };
            if(it.stats.pitch>0) so.lineSpacing=Math.round(it.stats.pitch*k*72*10)/10;
            s.addText(it.stats.text, so);
          }
        });
        needGroup=true;
      }
    }
    const fileName=`rapport_${slugify(club)}.pptx`;
    if(needGroup && typeof JSZip!=="undefined"){
      const blob=await pptx.write({outputType:"blob"});
      const zip=await JSZip.loadAsync(blob);
      const names=Object.keys(zip.files).filter(n=>/^ppt\/slides\/slide\d+\.xml$/.test(n));
      for(const n of names){ let sx=await zip.file(n).async("string"); sx=groupPlayersInSlideXml(sx); zip.file(n,sx); }
      const out=await zip.generateAsync({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.presentationml.presentation"});
      const a=document.createElement("a"); a.href=URL.createObjectURL(out); a.download=fileName; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),2000);
    } else {
      await pptx.writeFile({fileName});
    }
  }catch(e){ alert("Export échoué : "+e);} finally{ b.textContent=o; b.disabled=false; }
};

/* ===== Sélecteur de saison ===== */
const CURRENT_SEASON = "2025-2026";
const SEASONS = ["2026-2027", "2025-2026", "2024-2025"];   // ordre d'affichage
let SEASON_DATA = DATA;              // {clubs, byClub} de la saison active (2025-2026 = baké)
let CUR = { ligue2:null, xg:null, inp:null };  // blobs saison courante, mis en cache au démarrage

function fetchJSON(url){ return fetch(url+"?_="+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null); }

function noData(){
  const sel=document.getElementById("clubSelect");
  sel.innerHTML='<option value="">—</option>'; sel.value="";
  document.getElementById("stack").innerHTML='<div class="note" style="padding:26px 16px;text-align:center">Données à venir pour cette saison.</div>';
  document.getElementById("buildNote").innerHTML="";
}

function buildClubSelect(){
  const cl=(SEASON_DATA&&SEASON_DATA.clubs)||[];
  if(!cl.length){ noData(); return; }
  const sel=document.getElementById("clubSelect");
  sel.innerHTML=cl.map(c=>`<option value="${c}">${c}</option>`).join("");
  const def = cl.includes("Montpellier") ? "Montpellier" : cl[0];
  sel.value=def; sel.onchange=()=>renderClub(sel.value);
  document.getElementById("buildNote").innerHTML="Sélectionne un club : son <b>effectif</b> (photos LFP, comme l'onglet Effectif) puis ses <b>5 derniers matchs</b> s'affichent à la suite. Export PNG par diapo, ou Keynote (.pptx) pour tout.";
  renderClub(def);
}

async function loadSeason(season){
  if(season===CURRENT_SEASON){
    SEASON_DATA = DATA;
    LIGUE2 = CUR.ligue2; applyPlayerOverrides(LIGUE2); stampAvatars(LIGUE2); XG = CUR.xg; INP = CUR.inp; OUTP = CUR.outp; LOSS = CUR.loss; SMIX = CUR.smix;
    buildClubSelect(); return;
  }
  // saisons non-courantes : JSON suffixés (fallback gracieux si absents)
  document.getElementById("stack").innerHTML='<div class="note" style="padding:26px 16px;text-align:center">Chargement…</div>';
  const [m,l,x,p,o,ls,sm] = await Promise.all([
    fetchJSON("rapport_"+season+".json"),   // {clubs, byClub}
    fetchJSON("ligue2_"+season+".json"),
    fetchJSON("xg_"+season+".json"),
    fetchJSON("inposs_"+season+".json"),
    fetchJSON("outposs_"+season+".json"),
    fetchJSON("losses_"+season+".json"),
    fetchJSON("shotmix_"+season+".json")
  ]);
  if(!m || !m.byClub){ SEASON_DATA={clubs:[],byClub:{}}; LIGUE2=null; XG=null; INP=null; OUTP=null; LOSS=null; SMIX=null; noData(); return; }
  SEASON_DATA=m; LIGUE2=l; applyPlayerOverrides(LIGUE2); XG=x; INP=p; OUTP=o; LOSS=ls; SMIX=sm;
  buildClubSelect();
}

function start(){
  const ss=document.getElementById("seasonSelect");
  ss.innerHTML=SEASONS.map(s=>`<option value="${s}">Saison ${s}</option>`).join("");
  ss.value=CURRENT_SEASON;
  ss.onchange=()=>loadSeason(ss.value);
  loadSeason(CURRENT_SEASON);
}
/* ---- Override données joueurs : corrige n°/nom, masque les partis (clé = sbId, cf. CLAUDE.md) ---- */
const PLAYER_OVERRIDES = {
  132337: { num: 77, name: "EVERSON JR" }, // était "DA SILVA" #37
  166384: { num: 24 },                     // Junior Ndiaye
  440216: { num: 14 },                     // Victor Orakpo
  30661:  { hide: true },                  // Becir Omeragic (parti)
  32672:  { hide: true },                  // Tanguy Coulibaly (parti)
  29969:  { hide: true },                  // Joris Chotard (parti)
};
function applyPlayerOverrides(data){
  if(!data || !data.teams) return data;
  for(const team of Object.values(data.teams)){
    if(!team || !Array.isArray(team.squad)) continue;
    team.squad = team.squad.filter(p=>{
      const o = p && PLAYER_OVERRIDES[p.sbId];
      if(!o) return true;
      if(o.hide) return false;      // joueur parti → retiré
      Object.assign(p, o);          // applique n°/nom
      return true;
    });
  }
  return data;
}
