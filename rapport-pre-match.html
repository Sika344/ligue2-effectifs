  const MHSC_SHORT="MHSC", MHSC_COLOR="#ee6a4d";
let current = 0;

function placePlayers(team, side){
  const tmpl=FORMATIONS[team.formation]; const frag=[];
  (team.players||[]).forEach(p=>{
    let d,t,x,y; if(typeof p.x==='number'){d=p.x;t=p.y;} else {const c=(tmpl&&tmpl[p.pos])||[0.5,0.5];d=c[0];t=c[1];}
    if(side==='home'){ x=3+d*0.5*94; y=4+t*92; } else { x=97-d*0.5*94; y=96-t*92; }
    frag.push(`<div class="pl" style="left:${x.toFixed(2)}%;top:${y.toFixed(2)}%">
      <div class="disc" style="background:${team.color}"><span class="num">${p.num}</span><span class="pos">${p.pos}</span></div></div>`);
  });
  return frag.join("");
}

function evt(p){
  let s="";
  if(p.yc) s+=`<span class="yc">${p.yc}'</span>`;
  if(p.rc) s+=`<span class="yc" style="background:#d11;color:#fff">${p.rc}'</span>`;
  if(p.off) s+=`<span class="ev out"><span class="tri"></span>${p.off}'</span>`;
  if(p.on)  s+=`<span class="ev in"><span class="tri"></span>${p.on}'</span>`;
  return s?`<span class="pevt">${s}</span>`:"";
}

function panel(team, side){
  const col=team.color;
  let h=`<div class="phead" style="color:${col}">${side==='home'?"Équipe domicile":"Équipe extérieur"}</div>`;
  if(team.manager){ h+=`<div class="psub">Entraîneur</div><div class="mgr">${team.manager}</div>`; }
  h+=`<div class="psub">Onze de départ</div>`;
  if(team.players && team.players.length){
    team.players.forEach(p=>{ h+=`<div class="prow"><span class="pnum" style="color:${col}">${p.num}</span>
      <div class="pinfo"><div class="pn">${p.name}</div><div class="pr">${p.role||""}</div></div>${evt(p)}</div>`; });
  } else h+=`<div class="muted">À compléter</div>`;
  h+=`<div class="psub">Remplaçants</div>`;
  if(team.subs && team.subs.length){
    team.subs.forEach(p=>{ h+=`<div class="prow"><span class="pnum" style="color:${col}">${p.num}</span>
      <div class="pinfo"><div class="pn">${p.name}</div></div>${evt(p)}</div>`; });
  } else h+=`<div class="muted">À compléter</div>`;
  return h;
}

function goalsBlock(H,A){
  const items=[];
  (H.goals||[]).forEach(g=>items.push({c:H.color,n:g.num,m:g.min,og:g.og}));
  (A.goals||[]).forEach(g=>items.push({c:A.color,n:g.num,m:g.min,og:g.og}));
  if(!items.length) return "";
  return `<div class="glab">Buts</div><div class="grow">`+
    items.map(g=>`<div class="gitem"><div class="gdisc" style="background:${g.c}">${g.n}</div><div class="gmin">${g.m}'${g.og?" csc":""}</div></div>`).join("")+`</div>`;
}

function render(){
  const m=MATCHES[current], H=m.home, A=m.away;
  document.getElementById("mtitle").innerHTML =
    `<span style="color:${H.color}">${H.name} ${H.score}</span><span> – </span><span style="color:${A.color}">${A.score} ${A.name}</span>`;
  const sub=[];
  if(m.kickoff||m.date) sub.push(`<b>Coup d'envoi&nbsp;:</b> ${[m.kickoff,m.date].filter(Boolean).join(', ')||'—'}`);
  if(m.venue) sub.push(`<span class="sep"></span><b>Stade&nbsp;:</b> ${m.venue}`);
  if(m.comp)  sub.push(`<span class="sep"></span>${m.comp}`);
  document.getElementById("msub").innerHTML=sub.join(" ");

  document.getElementById("players").innerHTML = placePlayers(H,'home')+placePlayers(A,'away');
  document.getElementById("fHome").innerHTML = H.formation?`Formation&nbsp;: <b>${H.formation}</b>`:"";
  document.getElementById("fAway").innerHTML = A.formation?`Formation&nbsp;: <b>${A.formation}</b>`:"";
  document.getElementById("panelL").innerHTML = panel(H,'home');
  document.getElementById("panelR").innerHTML = panel(A,'away');
  document.getElementById("goals").innerHTML = goalsBlock(H,A);

  const pend=document.getElementById("pending");
  if(m.pending){ pend.style.display="flex";
    document.getElementById("pendingTxt").innerHTML = m.info || "Score connu — feuille de match à vérifier avant publication."; }
  else pend.style.display="none";

  const bc=document.getElementById("brandCrest"); bc.textContent=MHSC_SHORT[0]; bc.style.background=MHSC_COLOR;
  document.getElementById("metaInfo").textContent=`Slide ${current+1}/${MATCHES.length} — Montpellier, 6 derniers matchs`;
}

function buildSelect(){
  const sel=document.getElementById("matchSelect");
  sel.innerHTML=MATCHES.map((m,i)=>{
    const opp=m.home.short==="MHSC"?m.away.name:m.home.name;
    return `<option value="${i}">Match ${i+1} — ${opp} (${m.home.score}-${m.away.score})${m.pending?" · à compléter":" · ✓"}</option>`;
  }).join("");
  sel.onchange=()=>{ current=+sel.value; render(); };
}

async function boardCanvas(){ return await html2canvas(document.getElementById("board"),{useCORS:true,backgroundColor:"#ffffff",scale:2,logging:false}); }
async function withBtn(id,fn){ const b=document.getElementById(id),o=b.textContent; b.textContent="…"; b.disabled=true;
  try{ await fn(); }catch(e){ alert("Export échoué : "+e); } finally{ b.textContent=o; b.disabled=false; } }
function slug(){ const m=MATCHES[current]; const opp=(m.home.short==="MHSC"?m.away.short:m.home.short)||"match";
  return `rapport_${current+1}_${opp}`.replace(/[^a-z0-9_]+/gi,"_"); }

document.getElementById("dl").onclick=()=>withBtn("dl", async()=>{
  const c=await boardCanvas(); const a=document.createElement("a"); a.download=slug()+".png"; a.href=c.toDataURL("image/png"); a.click(); });

document.getElementById("dlk").onclick=()=>withBtn("dlk", async()=>{
  const pptx=new pptxgenjs(); pptx.defineLayout({name:"L2",width:13.33,height:7.5}); pptx.layout="L2";
  const keep=current;
  for(let i=0;i<MATCHES.length;i++){
    current=i; render(); await new Promise(r=>setTimeout(r,140));
    const c=await boardCanvas(); const ar=c.width/c.height; let w=12.6,h=w/ar; if(h>7.0){h=7.0;w=h*ar;}
    const slide=pptx.addSlide(); slide.background={color:"070B16"};
    slide.addImage({data:c.toDataURL("image/png"),x:(13.33-w)/2,y:(7.5-h)/2,w,h});
  }
  current=keep; render(); await pptx.writeFile({fileName:"rapport-pre-match_montpellier.pptx"}); });

document.getElementById("buildNote").innerHTML =
  `<b>Slide 1 (Red Star 1-1 Montpellier)</b> : feuille de match complète et vérifiée — onze, remplaçants, entrées/sorties, cartons et buteurs. `+
  `Les <b>5 autres</b> : bon adversaire + bon score, feuille à compléter (on les fait un par un). `+
  `Édition : tableau <code>MATCHES</code> — joueur <code>{num,pos,name,role,off,yc,rc}</code>, remplaçant <code>{num,name,on}</code>, but <code>{num,min}</code>.`;

buildSelect(); render();
</script>
