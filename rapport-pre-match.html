  .mhead{text-align:center;padding:18px 16px 6px;color:var(--ink)}
  .mtitle{font-size:clamp(22px,3.4vw,34px);font-weight:800;letter-spacing:-.01em;display:flex;justify-content:center;align-items:center;gap:.5ch;flex-wrap:wrap}
  .mtitle .score{color:var(--ink)}
  .msub{margin-top:6px;font-size:clamp(12px,1.6vw,15px);color:#3a4660;font-weight:600}
  .msub b{color:var(--ink)}
  .msub .sep{display:inline-block;width:26px}

  /* terrain horizontal */
  .pitchwrap{position:relative;width:100%;aspect-ratio:1000/620;background:#fff}
  .pitchwrap svg.lines{position:absolute;inset:0;width:100%;height:100%}
  .players{position:absolute;inset:0}
  .pl{position:absolute;transform:translate(-50%,-50%);text-align:center;z-index:2;width:74px}
  .disc{width:60px;height:60px;border-radius:50%;margin:0 auto;display:flex;flex-direction:column;
    align-items:center;justify-content:center;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.30);padding-top:2px}
  .disc .num{font-weight:800;font-size:23px;line-height:1}
  .disc .pos{font-weight:800;font-size:10px;line-height:1;margin-top:2px;letter-spacing:.02em;opacity:.95}

  /* libellés formation bas */
  .fbar{display:flex;justify-content:space-between;align-items:center;padding:10px 18px 14px;color:var(--ink)}
  .fbar div{font-size:clamp(12px,1.8vw,16px);font-weight:700}
  .fbar b{font-weight:900}

  /* overlay "à compléter" pour les matchs non remplis */
  .pending{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(245,247,250,.92);color:#3a4660;text-align:center;gap:8px;z-index:5}
  .pending .big{font-size:20px;font-weight:800;color:var(--ink)}
  .pending .small{font-size:13px;max-width:60%;line-height:1.5}

  .note{max-width:1180px;margin:12px auto 30px;padding:0 16px;color:#9fb0c8;font-size:12.5px;line-height:1.6}
  .note code{background:#11203a;padding:2px 6px;border-radius:4px;color:#cfe}
  .note b{color:#fff}

  @media(max-width:760px){ .disc{width:46px;height:46px;font-size:19px} .pos{font-size:9px} .pl{width:58px} }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body>
  <div class="topbar">
    <select id="matchSelect"></select>
    <span class="meta" id="metaInfo"></span>
    <div class="right">
      <select id="pageNav" onchange="if(this.value)location.href=this.value">
        <option value="index.html">Effectif</option>
        <option value="compo.html">Compo</option>
        <option value="compo-sans-stats.html">Compo sans stats</option>
        <option value="analytics.html">Analytics 360</option>
        <option value="rapport-pre-match.html" selected>Rapport pré-match</option>
      </select>
      <button id="dl">⬇ PNG (slide)</button>
      <button id="dlk">⬇ Keynote (.pptx)</button>
    </div>
  </div>

  <div class="frame">
    <div class="board" id="board">
      <div class="brand">
        <span class="crest" id="brandCrest">M</span>
        <span class="word">Rapport pré-match</span>
      </div>
      <div class="mhead">
        <div class="mtitle" id="mtitle"></div>
        <div class="msub" id="msub"></div>
      </div>
      <div class="pitchwrap">
        <svg class="lines" viewBox="0 0 1000 620" preserveAspectRatio="none">
          <g fill="none" stroke="#c2cad6" stroke-width="2.5">
            <rect x="12" y="12" width="976" height="596" rx="3"/>
            <line x1="500" y1="12" x2="500" y2="608"/>
            <circle cx="500" cy="310" r="74"/>
            <!-- left box -->
            <rect x="12" y="158" width="150" height="304"/>
            <rect x="12" y="232" width="58" height="156"/>
            <path d="M162,250 A74,74 0 0,1 162,370"/>
            <!-- right box -->
            <rect x="838" y="158" width="150" height="304"/>
            <rect x="930" y="232" width="58" height="156"/>
            <path d="M838,250 A74,74 0 0,0 838,370"/>
            <!-- corners -->
            <path d="M12,26 A14,14 0 0,1 26,12"/>
            <path d="M974,12 A14,14 0 0,1 988,26"/>
            <path d="M988,594 A14,14 0 0,1 974,608"/>
            <path d="M26,608 A14,14 0 0,1 12,594"/>
          </g>
          <circle cx="500" cy="310" r="3.5" fill="#c2cad6"/>
          <circle cx="120" cy="310" r="3.5" fill="#c2cad6"/>
          <circle cx="880" cy="310" r="3.5" fill="#c2cad6"/>
        </svg>
        <div class="players" id="players"></div>
        <div class="pending" id="pending" style="display:none">
          <div class="big">Compo à compléter</div>
          <div class="small" id="pendingTxt"></div>
        </div>
      </div>
      <div class="fbar">
        <div id="fHome"></div>
        <div id="fAway"></div>
      </div>
    </div>
  </div>

  <div class="note" id="buildNote"></div>

<script>
/* ============================================================
   MOTEUR — gabarits de formation (repère canonique : équipe
   qui attaque vers la droite, "gauche = haut").
   d = profondeur (0 = sa ligne de but → 1 = ligne médiane)
   t = position verticale (0 = haut → 1 = bas)
   L'équipe de droite est rendue en rotation 180° (x et y inversés),
   comme sur les visuels StatsBomb.
   ============================================================ */
const FORMATIONS = {
  "3-5-2":{GK:[.10,.52],LCB:[.34,.32],CB:[.34,.52],RCB:[.34,.72],LWB:[.38,.11],RWB:[.38,.93],
           CDM:[.50,.52],LCM:[.71,.34],RCM:[.71,.70],LCF:[.91,.34],RCF:[.91,.70]},
  "3-4-2-1":{GK:[.10,.52],LCB:[.34,.32],CB:[.34,.52],RCB:[.34,.72],LWB:[.38,.11],RWB:[.38,.93],
             LDM:[.55,.34],RDM:[.55,.70],LAM:[.74,.34],RAM:[.74,.70],CF:[.90,.52]},
  "3-4-3":{GK:[.10,.52],LCB:[.34,.32],CB:[.34,.52],RCB:[.34,.72],LWB:[.55,.12],LCM:[.55,.40],RCM:[.55,.64],RWB:[.55,.92],
           LW:[.88,.18],CF:[.92,.52],RW:[.88,.86]},
  "5-3-2":{GK:[.10,.52],LWB:[.36,.08],LCB:[.32,.34],CB:[.32,.52],RCB:[.32,.70],RWB:[.36,.96],
           CDM:[.58,.52],LCM:[.60,.32],RCM:[.60,.72],LCF:[.90,.38],RCF:[.90,.66]},
  "4-2-3-1":{GK:[.10,.52],LB:[.32,.10],LCB:[.32,.38],RCB:[.32,.62],RB:[.32,.90],
             LDM:[.52,.40],RDM:[.52,.64],LM:[.74,.12],CAM:[.74,.52],RM:[.74,.92],CF:[.91,.52]},
  "4-3-3":{GK:[.10,.52],LB:[.32,.10],LCB:[.32,.38],RCB:[.32,.62],RB:[.32,.90],
           CDM:[.55,.52],LCM:[.62,.32],RCM:[.62,.72],LW:[.88,.14],CF:[.92,.52],RW:[.88,.90]},
  "4-4-2":{GK:[.10,.52],LB:[.32,.10],LCB:[.32,.38],RCB:[.32,.62],RB:[.32,.90],
           LM:[.62,.12],LCM:[.60,.40],RCM:[.60,.64],RM:[.62,.92],LCF:[.90,.38],RCF:[.90,.66]},
  "4-4-1-1":{GK:[.10,.52],LB:[.32,.10],LCB:[.32,.38],RCB:[.32,.62],RB:[.32,.90],
             LM:[.60,.12],LCM:[.58,.40],RCM:[.58,.64],RM:[.60,.92],CAM:[.78,.52],CF:[.92,.52]},
  "4-5-1":{GK:[.10,.52],LB:[.32,.10],LCB:[.32,.38],RCB:[.32,.62],RB:[.32,.90],
           LM:[.62,.10],LCM:[.60,.34],CDM:[.55,.52],RCM:[.60,.70],RM:[.62,.92],CF:[.92,.52]},
  "4-1-4-1":{GK:[.10,.52],LB:[.32,.10],LCB:[.32,.38],RCB:[.32,.62],RB:[.32,.90],
             CDM:[.52,.52],LM:[.72,.12],LCM:[.70,.40],RCM:[.70,.64],RM:[.72,.92],CF:[.92,.52]}
};

/* ============================================================
   DONNÉES — 6 derniers matchs de Montpellier (focus du rapport).
   side:'home' => équipe à gauche ; 'away' => équipe à droite.
   Le 1er slide (Red Star) est VÉRIFIÉ (issu de ta capture).
   Les suivants : score/adversaire connus, compos à confirmer.
   ============================================================ */
const MHSC = {name:"Montpellier", short:"MHSC", color:"#ee6a4d", textDark:false};

const MATCHES = [
  { /* 1 — VÉRIFIÉ */
    label:"J34 · vs Red Star (E)", comp:"Ligue 2 BKT", date:"2026-05-09",
    kickoff:"18:00 UTC", venue:"Stade de Paris",
    home:{name:"Red Star FC", short:"RED", color:"#1b6b3a", textDark:false,
          formation:"3-5-2",
          players:[["16","GK"],["3","LCB"],["5","CB"],["20","RCB"],["7","LWB"],["2","RWB"],
                   ["27","CDM"],["98","LCM"],["4","RCM"],["91","LCF"],["23","RCF"]],
          score:1},
    away:{...MHSC, formation:"3-4-2-1",
          players:[["31","GK"],["23","LCB"],["6","CB"],["15","RCB"],["21","LWB"],["29","RWB"],
                   ["20","LDM"],["44","RDM"],["8","LAM"],["18","RAM"],["14","CF"]],
          score:1}
  },
  { /* 2 */
    label:"vs Clermont", comp:"Ligue 2 BKT", date:"à confirmer", kickoff:"", venue:"",
    pending:true,
    home:{name:"Montpellier", short:"MHSC", color:"#ee6a4d", formation:"4-2-3-1", players:[], score:1},
    away:{name:"Clermont Foot", short:"CF63", color:"#b21f2c", formation:"", players:[], score:2}
  },
  { /* 3 */
    label:"vs Amiens", comp:"Ligue 2 BKT", date:"à confirmer", kickoff:"", venue:"",
    pending:true,
    home:{name:"Montpellier", short:"MHSC", color:"#ee6a4d", formation:"4-2-3-1", players:[], score:2},
    away:{name:"Amiens SC", short:"ASC", color:"#1b1b1b", formation:"", players:[], score:0}
  },
  { /* 4 */
    label:"vs Grenoble", comp:"Ligue 2 BKT", date:"à confirmer", kickoff:"", venue:"",
    pending:true,
    home:{name:"Montpellier", short:"MHSC", color:"#ee6a4d", formation:"4-2-3-1", players:[], score:2},
    away:{name:"Grenoble", short:"GF38", color:"#1f3b7a", formation:"", players:[], score:1}
  },
  { /* 5 */
    label:"vs Annecy", comp:"Ligue 2 BKT", date:"à confirmer", kickoff:"", venue:"",
    pending:true,
    home:{name:"Montpellier", short:"MHSC", color:"#ee6a4d", formation:"4-2-3-1", players:[], score:0},
    away:{name:"Annecy FC", short:"ANN", color:"#e2231a", formation:"", players:[], score:0}
  },
  { /* 6 */
    label:"Match J29 (à identifier)", comp:"Ligue 2 BKT", date:"à confirmer", kickoff:"", venue:"",
    pending:true,
    home:{name:"Montpellier", short:"MHSC", color:"#ee6a4d", formation:"4-2-3-1", players:[], score:0},
    away:{name:"Adversaire", short:"???", color:"#5a647a", formation:"", players:[], score:0}
  }
];

/* ---------- rendu ---------- */
let current = 0;

function lum(hex){ const h=hex.replace('#',''); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return (0.299*r+0.587*g+0.114*b)/255; }

function placePlayers(team, side){
  const tmpl = FORMATIONS[team.formation];
  const frag = [];
  team.players.forEach(([num,pos])=>{
    const coord = (tmpl && tmpl[pos]) || [0.5,0.5];
    let d=coord[0], t=coord[1], x, y;
    if(side==='home'){ x = 3 + d*0.5*94; y = 4 + t*92; }
    else { x = 97 - d*0.5*94; y = 96 - t*92; }   // rotation 180°
    frag.push(
      `<div class="pl" style="left:${x.toFixed(2)}%;top:${y.toFixed(2)}%">
         <div class="disc" style="background:${team.color}">
           <span class="num">${num}</span><span class="pos">${pos}</span>
         </div>
       </div>`);
  });
  return frag.join("");
}

function render(){
  const m = MATCHES[current];
  const H = m.home, A = m.away;

  // titre coloré
  document.getElementById("mtitle").innerHTML =
    `<span style="color:${H.color}">${H.name} ${H.score}</span>`+
    `<span class="score"> – </span>`+
    `<span style="color:${A.color}">${A.score} ${A.name}</span>`;

  // sous-titre kickoff / venue
  const sub=[];
  if(m.kickoff||m.date) sub.push(`<b>Coup d'envoi&nbsp;:</b> ${[m.kickoff,m.date].filter(Boolean).join(', ')||'—'}`);
  if(m.venue) sub.push(`<span class="sep"></span><b>Stade&nbsp;:</b> ${m.venue}`);
  if(m.comp) sub.push(`<span class="sep"></span>${m.comp}`);
  document.getElementById("msub").innerHTML = sub.join(" ");

  // joueurs
  document.getElementById("players").innerHTML =
    placePlayers(H,'home') + placePlayers(A,'away');

  // formations bas
  document.getElementById("fHome").innerHTML = H.formation?`Formation&nbsp;: <b>${H.formation}</b>`:"";
  document.getElementById("fAway").innerHTML = A.formation?`Formation&nbsp;: <b>${A.formation}</b>`:"";

  // overlay à compléter
  const pend=document.getElementById("pending");
  if(m.pending){ pend.style.display="flex";
    document.getElementById("pendingTxt").textContent =
      "Score connu — compositions exactes à vérifier match par match avant publication.";
  } else pend.style.display="none";

  // bandeau marque
  const bc=document.getElementById("brandCrest"); bc.textContent=MHSC.short[0];
  bc.style.background=MHSC.color;

  // sélecteur + meta
  document.getElementById("metaInfo").textContent =
    `Slide ${current+1}/${MATCHES.length} — ${MHSC.name}, 6 derniers matchs`;
}

function buildSelect(){
  const sel=document.getElementById("matchSelect");
  sel.innerHTML = MATCHES.map((m,i)=>{
    const opp = m.home.short==="MHSC" ? m.away.name : m.home.name;
    const sc = `${m.home.score}-${m.away.score}`;
    const tag = m.pending ? " · à compléter" : " · ✓";
    return `<option value="${i}">Match ${i+1} — ${opp} (${sc})${tag}</option>`;
  }).join("");
  sel.onchange = ()=>{ current=+sel.value; render(); };
}

/* ---------- export ---------- */
async function boardCanvas(){
  const board=document.getElementById("board");
  return await html2canvas(board,{useCORS:true,backgroundColor:"#ffffff",scale:2,logging:false});
}
async function withBtn(id,fn){
  const b=document.getElementById(id), o=b.textContent; b.textContent="…"; b.disabled=true;
  try{ await fn(); }catch(e){ alert("Export échoué : "+e); } finally{ b.textContent=o; b.disabled=false; }
}
function slug(){ const m=MATCHES[current]; const opp=(m.home.short==="MHSC"?m.away.short:m.home.short)||"match";
  return `rapport_${current+1}_${opp}`.replace(/[^a-z0-9_]+/gi,"_"); }

document.getElementById("dl").onclick = ()=>withBtn("dl", async()=>{
  const c=await boardCanvas();
  const a=document.createElement("a"); a.download=slug()+".png"; a.href=c.toDataURL("image/png"); a.click();
});

document.getElementById("dlk").onclick = ()=>withBtn("dlk", async()=>{
  const pptx=new pptxgenjs(); pptx.defineLayout({name:"L2",width:13.33,height:7.5}); pptx.layout="L2";
  const keep=current;
  for(let i=0;i<MATCHES.length;i++){
    current=i; render(); await new Promise(r=>setTimeout(r,140));
    const c=await boardCanvas();
    const ar=c.width/c.height; let w=12.4, h=w/ar; if(h>6.9){h=6.9;w=h*ar;}
    const slide=pptx.addSlide(); slide.background={color:"070B16"};
    slide.addImage({data:c.toDataURL("image/png"), x:(13.33-w)/2, y:(7.5-h)/2, w, h});
  }
  current=keep; render();
  await pptx.writeFile({fileName:"rapport-pre-match_montpellier.pptx"});
});

/* ---------- note de bas de page ---------- */
document.getElementById("buildNote").innerHTML =
  `<b>Slide 1 (Red Star 1-1 Montpellier)</b> : compo vérifiée d'après ta capture — Red Star en 3-5-2, MHSC en 3-4-2-1. `+
  `Les <b>5 autres</b> affichent le bon adversaire et le bon score, mais la composition reste à remplir (on les fait un par un, vérifiés). `+
  `Pour ajouter/corriger une compo : éditer le tableau <code>MATCHES</code> (formation + couples <code>[numéro, poste]</code>). `+
  `Gabarits dispo : <code>3-5-2, 3-4-2-1, 3-4-3, 5-3-2, 4-2-3-1, 4-3-3, 4-4-2, 4-4-1-1, 4-5-1, 4-1-4-1</code>.`;

buildSelect(); render();
</script>
</body>
