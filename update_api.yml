name: Update Ligue 2 (API)
on:
  schedule:
    - cron: '0 6 1,15 * *'
  workflow_dispatch:
    inputs:
      comp_id:
        description: "StatsBomb competition_id (Ligue 2)"
        required: false
        default: "8"
      season_id:
        description: "StatsBomb season_id (buts/passes)"
        required: false
        default: "318"
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pycountry statsbombpy pandas
      - name: Fetch squads
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python fetch_api.py
      - name: Merge StatsBomb goals/assists
        env:
          SB_USERNAME: ${{ secrets.SB_USERNAME }}
          SB_PASSWORD: ${{ secrets.SB_PASSWORD }}
          SB_COMP_ID: ${{ github.event.inputs.comp_id || '8' }}
          SB_SEASON_ID: ${{ github.event.inputs.season_id || '318' }}
        run: python merge_stats_sb.py
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add ligue2.json
          git commit -m "MAJ effectifs Ligue 2 (FotMob) + buts/passes StatsBomb" || echo "no changes"
          git push
