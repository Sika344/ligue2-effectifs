<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compo Ligue 2 — Export Keynote</title>
<style>
  :root{
    --navy:#0a1733; --navy2:#0d1f44; --gold:#c9a24b; --orange:#ff7a18;
    --field:#eef1f5; --line:#b7c0cd; --ink:#11203f; --muted:#69748c; --box:#cad0db;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:#070b16;color:#fff;-webkit-font-smoothing:antialiased}
  .topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 16px;background:#0a1428;border-bottom:1px solid rgba(255,255,255,.06)}
  .topbar select{background:#16234a;color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:8px 12px;font-size:14px;font-weight:600;cursor:pointer;max-width:60vw}
  .topbar .meta{font-size:12px;color:#9fb0c8}
  .topbar a{color:#9fb0c8;text-decoration:none;font-size:14px;font-weight:600}
  .topbar a:hover{color:#fff}

  .frame{max-width:1280px;margin:14px auto;padding:0 12px}
  .board{position:relative;background:linear-gradient(135deg,var(--navy),var(--navy2));
    border-radius:14px;padding:12px;box-shadow:0 12px 40px rgba(0,0,0,.45)}
  .corner{position:absolute;width:30px;height:30px;z-index:5}
  .corner.tl{top:8px;left:8px;border-top:3px solid var(--gold);border-left:3px solid var(--gold)}
  .corner.tr{top:8px;right:8px;border-top:3px solid var(--gold);border-right:3px solid var(--gold)}
  .corner.bl{bottom:8px;left:8px;border-bottom:3px solid var(--gold);border-left:3px solid var(--gold)}
  .corner.br{bottom:8px;right:8px;border-bottom:3px solid var(--gold);border-right:3px solid var(--gold)}

  .header{position:relative;text-align:center;padding:10px 0 12px;border-bottom:2px solid var(--gold)}
  .header h1{font-family:Georgia,"Times New Roman",serif;letter-spacing:.2em;font-size:clamp(24px,4.5vw,42px);font-weight:700;color:#fff}
  .crest{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;display:flex;align-items:center;justify-content:center}
  .crest img{max-width:52px;max-height:52px;object-fit:contain}
  .crest.left{left:8px}.crest.right{right:8px}

  .pitch{position:relative;width:100%;aspect-ratio:1000/660;margin-top:10px;border-radius:8px;overflow:hidden;
    background:linear-gradient(180deg,#f3f5f8,#e9edf2)}
  .pitch svg.lines{position:absolute;inset:0;width:100%;height:100%}
  .layer{position:absolute;inset:0}

  .slot{position:absolute;transform:translate(-50%,-50%);width:104px;text-align:center;z-index:2}
  .photo-wrap{height:62px;display:flex;align-items:flex-end;justify-content:center}
  .photo{height:62px;width:auto;max-width:80px;object-fit:contain;filter:drop-shadow(0 3px 4px rgba(0,0,0,.25))}
  .jersey{height:54px;width:46px;border-radius:8px;background:linear-gradient(180deg,#22386b,#16284f);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff}
  .flag{font-size:14px;line-height:1;margin-top:3px}
  .num{font-weight:800;font-size:15px;color:var(--ink);border-bottom:2px solid var(--ink);display:inline-block;line-height:1.1;padding:0 2px;min-width:14px}
  .name{font-weight:800;font-size:12px;color:var(--ink);letter-spacing:.01em;margin-top:3px;line-height:1.05;text-transform:uppercase}
  .bio{font-size:9.5px;color:var(--muted);margin-top:1px;white-space:nowrap}
  .stats{display:inline-block;margin-top:4px;border:1.5px solid var(--box);border-radius:4px;background:#fff;padding:2px 6px;text-align:center}
  .stats .row{line-height:1.3;white-space:nowrap}
  .stats .v{color:var(--orange);font-weight:800;font-size:12px;margin-right:4px;vertical-align:middle}
  .stats .ic{vertical-align:middle;display:inline-block}
  .gleft{position:absolute;top:-2px;right:10px;color:#e11d2a;font-weight:800;font-size:13px;z-index:3;text-shadow:0 1px 2px rgba(255,255,255,.6)}

  .slot.empty .ph{width:46px;height:46px;border-radius:50%;border:2px dashed var(--line);color:var(--muted);
    display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto;background:rgba(255,255,255,.35)}
  .slot.empty .phlab{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.08em}
  .editctl{margin-top:5px;width:104px;max-width:104px;font-size:10.5px;padding:3px 4px;border-radius:6px;
    background:rgba(10,20,40,.92);color:#fff;border:1px solid rgba(255,255,255,.3)}

  .note{max-width:1280px;margin:10px auto 30px;padding:0 16px;color:#9fb0c8;font-size:12px;line-height:1.5}
  .note code{background:#11203a;padding:2px 6px;border-radius:4px;color:#cfe}
  @media(max-width:760px){ .slot{width:80px} .photo,.photo-wrap{height:46px} .name{font-size:10px} .bio{font-size:8px} .stats .v{font-size:10px} .editctl{width:80px} }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body>
  <div class="topbar">
    <select id="teamSelect"></select>
    <select id="formationSelect"></select>
    <span class="meta" id="metaInfo">chargement…</span>
    <button id="dl" style="margin-left:auto;background:#16234a;color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:8px 12px;font-weight:700;font-size:13px;cursor:pointer">⬇ PNG</button>
    <button id="dlk" style="margin-left:8px;background:var(--gold);color:#111;border:none;border-radius:8px;padding:8px 12px;font-weight:700;font-size:13px;cursor:pointer">⬇ Keynote (.pptx)</button>
    <a href="index.html" style="margin-left:14px">← Effectif complet</a>
  </div>

  <div class="frame">
    <div class="board" id="board">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <div class="header">
        <div class="crest left" id="crestL"></div>
        <h1>COMPO</h1>
        <div class="crest right" id="crestR"></div>
      </div>
      <div class="pitch">
        <svg class="lines" viewBox="0 0 1000 660" preserveAspectRatio="none">
          <g fill="none" stroke="#b7c0cd" stroke-width="2.5">
            <rect x="12" y="12" width="976" height="636" rx="4"/>
            <line x1="12" y1="330" x2="988" y2="330"/>
            <circle cx="500" cy="330" r="66"/>
            <circle cx="500" cy="330" r="3" fill="#b7c0cd"/>
            <rect x="300" y="12" width="400" height="110"/>
            <rect x="400" y="12" width="200" height="48"/>
            <path d="M 388 122 A 66 66 0 0 0 612 122"/>
            <circle cx="500" cy="86" r="3" fill="#b7c0cd"/>
            <rect x="300" y="538" width="400" height="110"/>
            <rect x="400" y="600" width="200" height="48"/>
            <path d="M 388 538 A 66 66 0 0 1 612 538"/>
            <circle cx="500" cy="574" r="3" fill="#b7c0cd"/>
          </g>
        </svg>
        <div class="layer" id="layer"></div>
      </div>
    </div>
  </div>

  <div class="note">
    Choisis une équipe et une formation, place ton XI via les menus sous chaque poste, puis exporte.
    Les menus n apparaissent pas sur l image. Le <code>.pptx</code> s ouvre d un double-clic dans Keynote.
  </div>

<script>
const FALLBACK={season:"démo",updated:"—",teams:{"Montpellier HSC":{logo:null,squad:[
 {num:31,name:"SIMON N.",flag:"🇨🇲",height:188,age:23,pos:"GK",posDesc:"GK"},
 {num:1,name:"MICHEL",flag:"🇫🇷",height:189,age:34,pos:"GK",posDesc:"GK"},
 {num:15,name:"LAPORTE",flag:"🇫🇷",height:185,age:32,pos:"DEF",posDesc:"CB",g:1,a:0},
 {num:23,name:"MOUANGA",flag:"🇫🇷",height:183,age:20,pos:"DEF",posDesc:"CB",g:0,a:0},
 {num:29,name:"TCHATO",flag:"🇨🇲",height:182,age:23,pos:"DEF",posDesc:"RB",g:0,a:3},
 {num:25,name:"NDOLLO",flag:"🇨🇲",height:172,age:20,pos:"DEF",posDesc:"LB",g:0,a:0},
 {num:77,name:"EVERSON",flag:"🇧🇷",height:182,age:22,pos:"MID",posDesc:"CDM",g:0,a:0},
 {num:44,name:"CHENNAHI",flag:"🇫🇷",height:182,age:21,pos:"MID",posDesc:"CM",g:0,a:0},
 {num:10,name:"FAYAD",flag:"🇫🇷",height:172,age:22,pos:"MID",posDesc:"CAM",g:1,a:1},
 {num:19,name:"MENDY",flag:"🇫🇷",height:185,age:32,pos:"ATT",posDesc:"ST",g:5,a:1},
 {num:24,name:"NDIAYE",flag:"🇫🇷",height:183,age:21,pos:"ATT",posDesc:"ST"},
]}}};

const FORMATIONS={
 "4-3-3":  [["GK",1],["DEF",4],["MID",3],["ATT",3]],
 "4-4-2":  [["GK",1],["DEF",4],["MID",4],["ATT",2]],
 "4-2-3-1":[["GK",1],["DEF",4],["MID",2],["MID",3],["ATT",1]],
 "3-5-2":  [["GK",1],["DEF",3],["MID",5],["ATT",2]],
 "5-3-2":  [["GK",1],["DEF",5],["MID",3],["ATT",2]],
 "4-5-1":  [["GK",1],["DEF",4],["MID",5],["ATT",1]],
};
const YS={4:[88,66,42,18],5:[88,71,52,33,14]};
let DATA=null, slots=[], selection=[];
const BALL='data:image/svg+xml;base64,'+btoa('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="13" height="13"><circle cx="16" cy="16" r="14" fill="#fff" stroke="#1b2a4a" stroke-width="2"/><path d="M16 9l4.5 3.3-1.7 5.3h-5.6L11.5 12.3z" fill="#1b2a4a"/><path d="M16 9V5M20.5 12.3l3.6-1.3M18.8 17.6l2.4 3.1M13.2 17.6l-2.4 3.1M11.5 12.3 7.9 11" stroke="#1b2a4a" stroke-width="1.4" fill="none"/></svg>');
const BOOT='data:image/svg+xml;base64,'+btoa('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 22" width="15" height="11"><path d="M3 5c0-1 .8-1.8 1.8-1.8H8l1.2 6.5 10.5 2.2c3.3.7 6.2 2.8 7.4 5.6l.5 1.5H4.2C3 19 2 18 2 16.8z" fill="#1b2a4a"/><g fill="#fff"><circle cx="9" cy="17.5" r="1"/><circle cx="14" cy="17.5" r="1"/><circle cx="19" cy="17.5" r="1"/></g></svg>');

function buildSlots(form){
  const lines=FORMATIONS[form], ys=YS[lines.length];
  slots=[];
  lines.forEach((ln,li)=>{
    const grp=ln[0], n=ln[1], y=ys[li];
    for(let k=0;k<n;k++){ slots.push({grp, gk:grp==="GK", x:12+76*(k+0.5)/n, y}); }
  });
  selection=slots.map(()=>null);
}

function optionsFor(slot, squad, myVal){
  const used=new Set(selection.filter((v,i)=>v!=null && i!==slots.indexOf(slot)));
  const opt=(i)=>`<option value="${i}" ${i===myVal?"selected":""} ${used.has(i)&&i!==myVal?"disabled":""}>#${squad[i].num} ${squad[i].name}</option>`;
  const byPos=(P)=>squad.map((p,i)=>[p,i]).filter(([p])=>p.pos===P && p.num!=null).map(([,i])=>opt(i)).join("");
  if(slot.gk) return `<option value="">— gardien —</option>`+byPos("GK");
  return `<option value="">— joueur —</option>`+
    `<optgroup label="Défenseurs">${byPos("DEF")}</optgroup>`+
    `<optgroup label="Milieux">${byPos("MID")}</optgroup>`+
    `<optgroup label="Attaquants">${byPos("ATT")}</optgroup>`;
}

function cardInner(p){
  const num=(p.num==null)?"":p.num;
  const photo = p.photo
    ? `<img class="photo" src="${p.photo}" alt="" onerror="this.outerHTML='<div class=&quot;jersey&quot;>'+(${JSON.stringify(String(num))}||'?')+'</div>'">`
    : `<div class="jersey">${num||"?"}</div>`;
  const bio=[p.height?`${p.height} cm`:null,(p.age!=null)?`${p.age} ans`:null].filter(Boolean).join(" - ");
  const stats=(p.g!=null||p.a!=null)?`<div class="stats">
      <div class="row"><span class="v">${p.g??0}</span><img class="ic" width="13" height="13" src="${BALL}"></div>
      <div class="row"><span class="v">${p.a??0}</span><img class="ic" width="15" height="11" src="${BOOT}"></div>
    </div>`:"";
  return `${p.foot==='left'?'<span class="gleft">G</span>':''}<div class="photo-wrap">${photo}</div>
    <div class="flag">${p.flag||""}</div>
    <div class="num">${num}</div>
    <div class="name">${p.name}</div>
    <div class="bio">${bio}</div>${stats}`;
}
function placeholderInner(slot){
  return `<div class="ph">+</div><div class="phlab">${slot.gk?"Gardien":"Joueur"}</div>`;
}

function render(){
  const team=DATA.teams[teamSelect.value], squad=team.squad;
  ["crestL","crestR"].forEach(id=>{document.getElementById(id).innerHTML=team.logo?`<img src="${team.logo}" alt="">`:"";});
  const picked=selection.filter(v=>v!=null).length;
  document.getElementById("metaInfo").textContent=`${teamSelect.value} • ${formationSelect.value} • ${picked}/11 • saison ${DATA.season}`;
  const host=document.getElementById("layer"); host.innerHTML="";
  slots.forEach((slot,si)=>{
    const val=selection[si], p=val!=null?squad[val]:null;
    const div=document.createElement("div");
    div.className="slot"+(slot.gk?" gk":"")+(p?"":" empty");
    div.style.left=slot.x+"%"; div.style.top=slot.y+"%";
    div.innerHTML=(p?cardInner(p):placeholderInner(slot))+
      `<select class="editctl" data-si="${si}">${optionsFor(slot,squad,val)}</select>`;
    host.appendChild(div);
  });
  host.querySelectorAll("select.editctl").forEach(sel=>{
    sel.onchange=()=>{ const si=+sel.dataset.si; selection[si]=sel.value===""?null:+sel.value; render(); };
  });
}

async function toDataURL(url){
  const proxy="https://images.weserv.nl/?url="+encodeURIComponent(url)+"&output=png";
  const r=await fetch(proxy); const b=await r.blob();
  return await new Promise(res=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.readAsDataURL(b);});
}
async function boardCanvas(){
  const board=document.getElementById("board");
  const hide=[...board.querySelectorAll(".editctl, .slot.empty")];
  const prev=hide.map(e=>e.style.display); hide.forEach(e=>e.style.display="none");
  const imgs=[...board.querySelectorAll("img")]; const src0=imgs.map(im=>im.src);
  try{
    await Promise.all(imgs.map(async im=>{ if(im.src.indexOf("data:")===0)return; try{ im.src=await toDataURL(im.src); }catch(e){} }));
    return await html2canvas(board,{useCORS:true,backgroundColor:null,scale:2,logging:false});
  } finally {
    imgs.forEach((im,i)=>im.src=src0[i]);
    hide.forEach((e,i)=>e.style.display=prev[i]);
  }
}
function slug(){ return (teamSelect.value+"_"+formationSelect.value).replace(/[^a-z0-9]+/gi,"_"); }
async function withBtn(id,fn){
  if(!selection.some(v=>v!=null)){ alert("Sélectionne au moins un joueur."); return; }
  const b=document.getElementById(id); const o=b.textContent; b.textContent="…"; b.disabled=true;
  try{ await fn(); }catch(e){ alert("Export échoué : "+e); } finally{ b.textContent=o; b.disabled=false; }
}
function exportPNG(){ return withBtn("dl", async()=>{
  const c=await boardCanvas();
  const a=document.createElement("a"); a.download="compo_"+slug()+".png"; a.href=c.toDataURL("image/png"); a.click();
}); }
function exportPPTX(){ return withBtn("dlk", async()=>{
  const c=await boardCanvas(); const data=c.toDataURL("image/png"); const aspect=c.width/c.height;
  const W=13.333, H=Math.round(W/aspect*100)/100;
  const pptx=new PptxGenJS(); pptx.defineLayout({name:"BOARD",width:W,height:H}); pptx.layout="BOARD";
  const s=pptx.addSlide(); s.background={color:"070B16"}; s.addImage({data,x:0,y:0,w:W,h:H});
  await pptx.writeFile({fileName:"compo_"+slug()+".pptx"});
}); }

function init(data){
  DATA=data;
  Object.keys(DATA.teams).sort().forEach(t=>teamSelect.add(new Option(t,t)));
  Object.keys(FORMATIONS).forEach(f=>formationSelect.add(new Option(f,f)));
  buildSlots(formationSelect.value);
  teamSelect.onchange=()=>{ buildSlots(formationSelect.value); render(); };
  formationSelect.onchange=()=>{ buildSlots(formationSelect.value); render(); };
  document.getElementById("dl").onclick=exportPNG;
  document.getElementById("dlk").onclick=exportPPTX;
  render();
}
fetch("ligue2.json?_="+Date.now()).then(r=>{if(!r.ok)throw 0;return r.json();})
  .then(d=>init(d)).catch(()=>init(FALLBACK));
</script>
</body>
</html>
