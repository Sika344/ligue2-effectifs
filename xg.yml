# .github/workflows/xg.yml
# Régénère xg.json (xG par 15 min, saison complète) et le committe s'il a changé.
# Pré-requis : ajouter les secrets de dépôt SB_USERNAME et SB_PASSWORD
#   (Settings → Secrets and variables → Actions → New repository secret).
# Placer ce fichier dans .github/workflows/xg.yml et build_xg.py à la racine du repo.

name: Build xG (15 min)

on:
  schedule:
    - cron: "30 4 * * *"      # tous les jours à 04:30 UTC
  workflow_dispatch: {}        # déclenchement manuel possible

permissions:
  contents: write

concurrency:
  group: build-xg
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install statsbombpy pandas

      - name: Generate xg.json
        env:
          SB_USERNAME: ${{ secrets.SB_USERNAME }}
          SB_PASSWORD: ${{ secrets.SB_PASSWORD }}
        run: python build_xg.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain xg.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add xg.json
            git commit -m "chore: maj xg.json (xG par 15 min)"
            git push
          else
            echo "xg.json inchangé."
          fi
